            function updateInventoryHud() {
                const items = advState.inventory;
                const list = inventoryList;
                list.innerHTML = '';
                let hasItems = false;
                for (const [key, count] of Object.entries(items)) {
                    if (count > 0 && ITEMS[key]) {
                        hasItems = true;
                        const div = document.createElement('div');
                        div.className = 'inv-item';
                        div.innerHTML =
                            `<span>${ITEMS[key].emoji} ${ITEMS[key].name}</span><span class="qty">×${count}</span>`;
                        list.appendChild(div);
                    }
                }
                if (!hasItems) {
                    list.innerHTML = '<div style="color:#6d7ea3;font-size:6px;text-align:center;">Empty</div>';
                }
            }

            function renderFullInventory() {
                const items = advState.inventory;
                let html = '';
                let hasItems = false;
                for (const [key, count] of Object.entries(items)) {
                    if (count > 0 && ITEMS[key]) {
                        hasItems = true;
                        html +=
                            `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1f2d4a;">
                            <span>${ITEMS[key].emoji} ${ITEMS[key].name}</span>
                            <span style="color:#5be7d9;">×${count}</span>
                            <span style="color:#6d7ea3;font-size:12px;">${ITEMS[key].desc}</span>
                        </div>`;
                    }
                }
                if (!hasItems) {
                    html = '<div style="color:#6d7ea3;text-align:center;padding:20px;">Your inventory is empty.</div>';
                }
                inventoryFullList.innerHTML = html;
            }

            function bounceSprite(el) {
                el.classList.remove('spawn-in');
                void el.offsetWidth;
                el.classList.add('spawn-in');
            }

            function pulsePlate(el) {
                el.classList.remove('pulse');
                void el.offsetWidth;
                el.classList.add('pulse');
            }

            function startTypeParticles(variant) {
                if (typeParticleTimer) clearInterval(typeParticleTimer);
                const type = palettes[variant % palettes.length];
                typeParticleTimer = setInterval(() => {
                    if (enemyHp <= 0) return;
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.background = type.particle;
                    p.style.width = (4 + Math.random() * 4) + 'px';
                    p.style.height = p.style.width;
                    p.style.right = (40 + Math.random() * 80) + 'px';
                    p.style.bottom = (130 + Math.random() * 80) + 'px';
                    p.style.left = 'auto';
                    const dur = 1.8 + Math.random() * 1.4;
                    p.style.animationDuration = dur + 's';
                    p.style.animationName = 'floatParticle';
                    p.style.boxShadow = `0 0 8px ${type.particle}`;
                    arena.appendChild(p);
                    setTimeout(() => p.remove(), dur * 1000 + 200);
                }, 300);
            }

            function setDialogue(speaker, text, glitch = false) {
                dialogue.innerHTML = `<span class="speaker">${speaker}:</span><span class="text">${text}</span>`;
                if (glitch) dialogue.classList.add('glitching');
                else dialogue.classList.remove('glitching');
            }

            // ── Show battle transition ──
            function showBattleTransition(enemyNameText, callback) {
                battleTransition.classList.add('active');
                transitionEnemyName.textContent = enemyNameText || '???';
                sfx('spawn');
                flash.classList.remove('go');
                void flash.offsetWidth;
                flash.className = 'flash gold';
                flash.classList.add('go');
                setTimeout(() => flash.className = 'flash', 400);

                setTimeout(() => {
                    battleTransition.classList.remove('active');
                    if (callback) callback();
                }, 1800);
            }

            // ── Use item from inventory ──
            function useItem(itemKey) {
                if (!advState.inventory[itemKey] || advState.inventory[itemKey] <= 0) return false;
                const item = ITEMS[itemKey];
                if (!item) return false;

                if (item.use === 'heal') {
                    const healAmt = item.value || 2;
                    playerHp = Math.min(playerHp + healAmt, PLAYER_HP_SEGMENTS);
                    advState.inventory[itemKey]--;
                    updateHud();
                    sfx('heal');
                    setDialogue('💚 ITEM', `Used ${item.name}! Restored ${healAmt} HP.`, false);
                    pulsePlate(playerPlate);
                    return true;
                }
                if (item.use === 'key') {
                    if (advState.creaturesDefeated >= 3) {
                        setDialogue('🗝️ KEY', 'The Key Fragment glows! The Anomaly\'s true form is revealed!', false);
                        sfx('item');
                        // Trigger boss reveal
                        advState.storyFlag = true;
                        return true;
                    } else {
                        setDialogue('🗝️ KEY', 'The Key Fragment hums... You need to defeat all 3 creatures first.',
                        false);
                        return false;
                    }
                }
                return false;
            }

            function spawnEnemy() {
                const lvl = curLevel();
                const variant = round % NORMAL_TYPE_COUNT;
                drawSprite(enemyCanvas, variant, palettes[variant]);
                enemyCanvas.style.width = '120px';
                enemyCanvas.style.height = '120px';
                const name = names[round % names.length];
                enemyName.textContent = name;
                enemyLv.textContent = 'Lv' + round + ' · ' + palettes[variant].name;
                enemyCanvas.classList.remove('faint');
                enemyCanvas.style.opacity = '1';
                arena.classList.remove('boss-mode');
                enemyHpMax = ENEMY_HP_SEGMENTS;
                enemyHp = enemyHpMax;
                const [tx, ty] = randomCoord(lvl);
                currentTarget = [tx, ty];
                updateHud();
                const q = lvl.quadrantOnly ? 'I' : quadrantOf(tx, ty);
                setDialogue('⚔ ENEMY',
                    `A wild ${name} appears at (${fmt(tx,lvl)}, ${fmt(ty,lvl)}) — Quadrant ${q}.`,
                    false);
                nextBtn.disabled = true;
                attackBtn.disabled = false;
                hintBtn.disabled = false;
                startTypeParticles(variant);
                bounceSprite(enemyCanvas);
                battleInProgress = true;
                arena.classList.remove('adventure-mode');
                document.querySelector('.adventure-hud').style.display = 'none';
                document.querySelector('.inventory-hud').style.display = 'none';
                interactHint.style.display = 'none';
                enemyCanvas.style.display = 'block';
                playerCanvas.style.display = 'block';
                enemyPlate.style.display = 'flex';
                playerPlate.style.display = 'flex';
                mapCanvas.style.display = 'none';
                nextBtn.textContent = '➤ NEXT';
            }

            function spawnBoss() {
                const lvl = curLevel();
                drawSprite(enemyCanvas, BOSS_TYPE_INDEX, palettes[BOSS_TYPE_INDEX]);
                enemyCanvas.style.width = '140px';
                enemyCanvas.style.height = '140px';
                enemyName.textContent = 'THE ANOMALY';
                enemyLv.textContent = 'FINAL BOSS';
                enemyCanvas.classList.remove('faint');
                enemyCanvas.style.opacity = '1';
                arena.classList.add('boss-mode');
                enemyHpMax = BOSS_HP_SEGMENTS;
                enemyHp = enemyHpMax;
                const [tx, ty] = randomCoord(lvl);
                currentTarget = [tx, ty];
                updateHud();
                setDialogue('⚠ BOSS', '★ THE ANOMALY BARS THE WAY ★ Survive its assault, then strike.', true);
                nextBtn.disabled = true;
                attackBtn.disabled = false;
                hintBtn.disabled = false;
                startTypeParticles(BOSS_TYPE_INDEX);
                bounceSprite(enemyCanvas);
                battleInProgress = true;
                arena.classList.remove('adventure-mode');
                document.querySelector('.adventure-hud').style.display = 'none';
                document.querySelector('.inventory-hud').style.display = 'none';
                interactHint.style.display = 'none';
                enemyCanvas.style.display = 'block';
                playerCanvas.style.display = 'block';
                enemyPlate.style.display = 'flex';
                playerPlate.style.display = 'flex';
                mapCanvas.style.display = 'none';
                nextBtn.textContent = '➤ NEXT';
            }

            function startAdventureBattle(npc) {
                const variant = npc.battleVariant || 0;
                const name = npc.battleName || npc.name;
                const isBoss = npc.isBoss || false;

                showBattleTransition(name, () => {
                    const lvl = curLevel();
                    drawSprite(enemyCanvas, variant, palettes[variant % palettes.length]);
                    enemyCanvas.style.width = isBoss ? '140px' : '120px';
                    enemyCanvas.style.height = isBoss ? '140px' : '120px';
                    enemyName.textContent = name;
                    enemyLv.textContent = isBoss ? 'FINAL BOSS' : 'WILD';
                    enemyCanvas.classList.remove('faint');
                    enemyCanvas.style.opacity = '1';
                    if (isBoss) arena.classList.add('boss-mode');
                    else arena.classList.remove('boss-mode');
                    enemyHpMax = isBoss ? BOSS_HP_SEGMENTS : ENEMY_HP_SEGMENTS;
                    enemyHp = enemyHpMax;
                    const [tx, ty] = randomCoord(lvl);
                    currentTarget = [tx, ty];
                    updateHud();
                    setDialogue('⚔ BATTLE', `A wild ${name} appears at (${fmt(tx,lvl)}, ${fmt(ty,lvl)})!`, false);
                    battleInProgress = true;
                    startTypeParticles(variant);
                    bounceSprite(enemyCanvas);
                    arena.classList.remove('adventure-mode');
                    document.querySelector('.adventure-hud').style.display = 'none';
                    document.querySelector('.inventory-hud').style.display = 'none';
                    interactHint.style.display = 'none';
                    enemyCanvas.style.display = 'block';
                    playerCanvas.style.display = 'block';
                    enemyPlate.style.display = 'flex';
                    playerPlate.style.display = 'flex';
                    mapCanvas.style.display = 'none';
                    attackBtn.disabled = false;
                    hintBtn.disabled = false;
                    nextBtn.disabled = true;
                    nextBtn.textContent = '➤ NEXT';
                    sfx('attack');
                });
            }

            function performAttack(skill) {
                if (!currentTarget || enemyHp <= 0) return;

                // Check if using heal item from inventory
                if (skill.id === 'heal') {
                    // Try to use a health potion from inventory first
                    if (advState.inventory.health_potion && advState.inventory.health_potion > 0) {
                        useItem('health_potion');
                        return;
                    }
                    // Fallback to the heal skill
                    const healAmt = 1;
                    playerHp = Math.min(playerHp + healAmt, PLAYER_HP_SEGMENTS);
                    updateHud();
                    pulsePlate(playerPlate);
                    sfx('heal');
                    floatDamage(playerCanvas, '+' + healAmt + ' HP', false, '#6fd67a');
                    setDialogue('💚 HEAL', 'You restore ' + healAmt + ' HP.', false);
                    return;
                }

                const lvl = curLevel();
                let damage = skill.damage;
                let hit = true;
                let critical = false;

                const acc = skill.id === 'precision' ? 0.95 : skill.id === 'power' ? 0.75 : 0.55;
                if (Math.random() > acc) { hit = false; }
                if (hit && Math.random() < 0.15) { critical = true;
                    damage = Math.floor(damage * 1.8); }

                playerCanvas.classList.remove('dash');
                void playerCanvas.offsetWidth;
                playerCanvas.classList.add('dash');
                enemyCanvas.classList.remove('recoil');
                void enemyCanvas.offsetWidth;
                enemyCanvas.classList.add('recoil');
                setTimeout(() => { playerCanvas.classList.remove('dash');
                    enemyCanvas.classList.remove('recoil'); }, 500);

                if (!hit) {
                    playerHp = Math.max(playerHp - 1, 0);
                    updateHud();
                    pulsePlate(playerPlate);
                    flash.classList.remove('go');
                    void flash.offsetWidth;
                    flash.className = 'flash';
                    flash.classList.add('go');
                    floatDamage(playerCanvas, 'MISS', true);
                    setDialogue('💨 MISS', 'Your attack missed! The enemy counterattacks!', false);
                    if (playerHp <= 0) {
                        setDialogue('💀 DEFEAT', 'You ran out of HP!', false);
                        attackBtn.disabled = true;
                        hintBtn.disabled = true;
                        endBattle(false);
                    }
                    return;
                }

                enemyHp = Math.max(enemyHp - damage, 0);
                score += damage * 5;
                updateHud();
                pulsePlate(enemyPlate);
                const dmgText = critical ? '💥 ' + damage + '!' : '-' + damage;
                floatDamage(enemyCanvas, dmgText, false, critical ? '#ff6b6b' : '#f2c14e');
                flash.classList.remove('go');
                void flash.offsetWidth;
                flash.className = 'flash gold';
                flash.classList.add('go');
                setTimeout(() => flash.className = 'flash', 400);
                sfx('hit');

                const enemyNameText = enemyName.textContent;
                setDialogue('⚔ ATTACK',
                    `Dealt ${damage} damage to ${enemyNameText}${critical ? ' — CRITICAL!' : ''}!`, false);

                if (enemyHp <= 0) {
                    setTimeout(() => {
                        const variant = (round % NORMAL_TYPE_COUNT);
                        triggerKillEffect(variant);
                        enemyCanvas.style.opacity = '0';
                        arena.classList.remove('boss-mode');
                        setDialogue('🏆 VICTORY', `${enemyNameText} defeated!`, false);
                        sfx('victory');
                        attackBtn.disabled = true;
                        hintBtn.disabled = true;
                        nextBtn.disabled = false;
                        battleInProgress = false;
                        if (adventureMode) {
                            advState.creaturesDefeated++;
                            // Drop item
                            const npc = advState.npcs.find(n => n.battleName === enemyNameText);
                            if (npc && npc.dropsItem) {
                                const itemKey = npc.dropsItem;
                                if (ITEMS[itemKey]) {
                                    advState.inventory[itemKey] = (advState.inventory[itemKey] || 0) + 1;
                                    setDialogue('📦 LOOT', `You found a ${ITEMS[itemKey].name}!`, false);
                                    sfx('item');
                                }
                            }
                            checkAdventureQuests();
                            const npcIdx = advState.npcs.findIndex(n => n.battleName === enemyNameText);
                            if (npcIdx >= 0) {
                                advState.npcs.splice(npcIdx, 1);
                            }
                            updateChapter();
                            questText.textContent = advState.creaturesDefeated >= 3 ?
                                'The Anomaly has appeared! Find it at the center!' :
                                `Defeat ${3 - advState.creaturesDefeated} more creatures.`;
                        }
                        updateHud();
                    }, 400);
                } else {
                    setTimeout(() => {
                        const counterDmg = Math.floor(Math.random() * 2) + 1;
                        playerHp = Math.max(playerHp - counterDmg, 0);
                        updateHud();
                        pulsePlate(playerPlate);
                        flash.classList.remove('go');
                        void flash.offsetWidth;
                        flash.className = 'flash';
                        flash.classList.add('go');
                        floatDamage(playerCanvas, '-' + counterDmg, false, '#e8544b');
                        setDialogue('💢 COUNTER', `${enemyNameText} strikes back for ${counterDmg} damage!`,
                        false);
                        if (playerHp <= 0) {
                            setDialogue('💀 DEFEAT', 'You have been defeated!', false);
                            attackBtn.disabled = true;
                            hintBtn.disabled = true;
                            endBattle(false);
                        }
                    }, 500);
                }
            }

            function endBattle(win) {
                battleInProgress = false;
                if (adventureMode) {
                    if (!win) {
                        playerHp = PLAYER_HP_SEGMENTS;
                        updateHud();
                        enterAdventureMode();
                    } else {
                        enterAdventureMode();
                    }
                } else {
                    if (win) {
                        nextBtn.disabled = false;
                    } else {
                        setDialogue('💀 DEFEAT', 'Game Over! Press RESTART.', false);
                        attackBtn.disabled = true;
                        hintBtn.disabled = true;
                    }
                }
            }

            function floatDamage(target, text, miss, color) {
                const rect = target.getBoundingClientRect();
                const arenaRect = arena.getBoundingClientRect();
                const el = document.createElement('div');
                el.className = 'dmg-float' + (miss ? ' miss' : '') + (color === '#ff6b6b' ? ' critical' : ' hit');
                el.textContent = text;
                if (color) el.style.color = color;
                el.style.left = (rect.left - arenaRect.left + rect.width / 2 - 20) + 'px';
                el.style.top = (rect.top - arenaRect.top - 10) + 'px';
                arena.appendChild(el);
                setTimeout(() => el.remove(), 1000);
            }

            function triggerKillEffect(variant) {
                const rect = enemyCanvas.getBoundingClientRect();
                const arenaRect = arena.getBoundingClientRect();
                const cx = rect.left - arenaRect.left + rect.width / 2;
                const cy = rect.top - arenaRect.top + rect.height / 2;
                const pal = palettes[variant % palettes.length];
                const burst = document.createElement('div');
                burst.className = 'kill-flash';
                burst.style.left = (cx - 60) + 'px';
                burst.style.top = (cy - 60) + 'px';
                burst.style.width = '120px';
                burst.style.height = '120px';
                arena.appendChild(burst);
                setTimeout(() => burst.remove(), 650);
                const colors = [pal.body, pal.shade, '#ffffff', '#f2c14e', pal.accent];
                const shardCount = 28;
                for (let i = 0; i < shardCount; i++) {
                    const s = document.createElement('div');
                    s.className = 'shard';
                    const angle = (Math.PI * 2 / shardCount) * i + (Math.random() * 0.6 - 0.3);
                    const dist = 40 + Math.random() * 60;
                    const tx = Math.cos(angle) * dist,
                        ty = Math.sin(angle) * dist;
                    const size = 4 + Math.random() * 6;
                    s.style.setProperty('--tx', tx.toFixed(1) + 'px');
                    s.style.setProperty('--ty', ty.toFixed(1) + 'px');
                    s.style.setProperty('--rot', Math.floor(Math.random() * 360) + 'deg');
                    s.style.left = (cx - size / 2) + 'px';
                    s.style.top = (cy - size / 2) + 'px';
                    s.style.width = size + 'px';
                    s.style.height = size + 'px';
                    s.style.background = colors[i % colors.length];
                    s.style.animationDelay = (Math.random() * 0.08) + 's';
                    arena.appendChild(s);
                    setTimeout(() => s.remove(), 900);
                }
                const ko = document.createElement('div');
                ko.className = 'ko-text';
                ko.textContent = 'K.O.!';
                ko.style.left = (cx - 40) + 'px';
                ko.style.top = (cy - 50) + 'px';
                arena.appendChild(ko);
                setTimeout(() => ko.remove(), 1100);
                arena.classList.remove('kill-shake');
                void arena.offsetWidth;
                arena.classList.add('kill-shake');
                setTimeout(() => arena.classList.remove('kill-shake'), 500);
            }

            // ── targeting overlay ──
            function openOverlay() {
                const lvl = curLevel();
                overlay.classList.add('show');
                drawGrid(lvl);
                skillSelect.innerHTML = '';
                // Add item use options if in adventure mode
                if (adventureMode) {
                    const items = advState.inventory;
                    for (const [key, count] of Object.entries(items)) {
                        if (count > 0 && ITEMS[key]) {
                            const btn = document.createElement('button');
                            btn.className = 'skill-btn';
                            btn.textContent = `${ITEMS[key].emoji} ${ITEMS[key].name} (×${count})`;
                            btn.title = ITEMS[key].desc;
                            btn.addEventListener('click', (e) => {
                                e.stopPropagation();
                                closeOverlayFn();
                                useItem(key);
                            });
                            skillSelect.appendChild(btn);
                        }
                    }
                    // Separator
                    const sep = document.createElement('div');
                    sep.style.width = '100%';
                    sep.style.textAlign = 'center';
                    sep.style.color = '#6d7ea3';
                    sep.style.fontSize = '6px';
                    sep.style.padding = '4px 0';
                    sep.textContent = '— SKILLS —';
                    skillSelect.appendChild(sep);
                }
                SKILLS.forEach(skill => {
                    const btn = document.createElement('button');
                    btn.className = 'skill-btn' + (selectedSkill && selectedSkill.id === skill.id ? ' active' :
                        '');
                    btn.textContent = skill.emoji + ' ' + skill.name;
                    btn.title = skill.description;
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        selectedSkill = skill;
                        skillSelect.querySelectorAll('.skill-btn').forEach(b => b.classList.remove(
                        'active'));
                        btn.classList.add('active');
                        overlayTitle.textContent = `⚔ ${skill.name} — ${skill.description}`;
                    });
                    skillSelect.appendChild(btn);
                });
                if (!selectedSkill) selectedSkill = SKILLS[0];
                const firstSkill = skillSelect.querySelector('.skill-btn:not([style])');
                if (firstSkill) firstSkill.classList.add('active');
                overlayTitle.textContent = `⚔ ${selectedSkill.name} — ${selectedSkill.description}`;

                if (lvl.mode === 'tap') {
                    typedPanel.style.display = 'none';
                    const [tx, ty] = currentTarget;
                    const coords = spawnDecoys(tx, ty, lvl);
                    renderGridCreatures(coords, 0, lvl);
                    awaitingTypedAnswer = false;
                } else {
                    typedPanel.style.display = 'flex';
                    const [tx, ty] = currentTarget;
                    renderGridCreatures([
                        [tx, ty]
                    ], 0, lvl);
                    awaitingTypedAnswer = true;
                    typedInput.value = '';
                    typedInput.focus();
                }
            }

            function closeOverlayFn() { overlay.classList.remove('show'); }

            function handleGridGuess(el) {
                if (awaitingTypedAnswer) return;
                const isTarget = el.dataset.target === 'true';
                closeOverlayFn();
                if (isTarget) {
                    if (!selectedSkill) selectedSkill = SKILLS[0];
                    performAttack(selectedSkill);
                } else {
                    playerHp = Math.max(playerHp - 1, 0);
                    updateHud();
                    pulsePlate(playerPlate);
                    flash.classList.remove('go');
                    void flash.offsetWidth;
                    flash.className = 'flash';
                    flash.classList.add('go');
                    floatDamage(playerCanvas, 'MISS', true);
                    setDialogue('❌ WRONG', 'That\'s not the right target!', false);
                    if (playerHp <= 0) {
                        setDialogue('💀 DEFEAT', 'You ran out of HP!', false);
                        attackBtn.disabled = true;
                        hintBtn.disabled = true;
                        endBattle(false);
                    }
                }
            }

            function submitTypedFn() {
                const val = typedInput.value.trim();
                const match = val.match(/^(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)$/);
                if (!match) { setDialogue('⚠ INPUT', 'Enter coordinates like "4.5,-3" (x,y)'); return; }
                const gx = Number(match[1]),
                    gy = Number(match[2]);
                closeOverlayFn();
                const okX = Math.abs(gx - currentTarget[0]) < 0.05;
                const okY = Math.abs(gy - currentTarget[1]) < 0.05;
                if (okX && okY) {
                    if (!selectedSkill) selectedSkill = SKILLS[0];
                    performAttack(selectedSkill);
                } else {
                    playerHp = Math.max(playerHp - 1, 0);
                    updateHud();
                    pulsePlate(playerPlate);
                    flash.classList.remove('go');
                    void flash.offsetWidth;
                    flash.className = 'flash';
                    flash.classList.add('go');
                    floatDamage(playerCanvas, 'MISS', true);
                    setDialogue('❌ WRONG', 'Incorrect coordinates!', false);
                    if (playerHp <= 0) {
                        setDialogue('💀 DEFEAT', 'You ran out of HP!', false);
                        attackBtn.disabled = true;
                        hintBtn.disabled = true;
                        endBattle(false);
                    }
                }
            }

            function handleAttack() {
                if (!battleInProgress) {
                    setDialogue('⚠️', 'No enemy to fight!', false);
                    return;
                }
                openOverlay();
            }

            // ── Adventure Mode ──
            function enterAdventureMode() {
                arena.classList.add('adventure-mode');
                document.querySelector('.adventure-hud').style.display = 'block';
                document.querySelector('.inventory-hud').style.display = 'block';
                interactHint.style.display = 'block';
                enemyCanvas.style.display = 'none';
                playerCanvas.style.display = 'none';
                enemyPlate.style.display = 'none';
                playerPlate.style.display = 'none';
                mapCanvas.style.display = 'block';
                attackBtn.disabled = true;
                hintBtn.disabled = true;
                nextBtn.disabled = true;
                nextBtn.textContent = '↺ EXPLORE';
                battleInProgress = false;
                battleTransition.classList.remove('active');
                if (typeParticleTimer) { clearInterval(typeParticleTimer);
                    typeParticleTimer = null; }
                updateChapter();
                questText.textContent = advState.creaturesDefeated >= 3 ?
                    'The Anomaly has appeared! Find it at the center!' :
                    `Defeat ${3 - advState.creaturesDefeated} creatures to find the Anomaly.`;
                renderMap();
                setDialogue('📜 STORY',
                    'Explore the Lost Grid. Talk to NPCs with [E]. Defeat 3 creatures to face the Anomaly!', false);
                updateHud();
                updateInventoryHud();
            }

            function updateChapter() {
                const total = advState.creaturesDefeated;
                let idx = 0;
                if (total >= 3) idx = 3;
                else if (total >= 1) idx = 2;
                else if (total > 0) idx = 1;
                if (advState.gameComplete) idx = 4;
                advState.chapterIndex = idx;
                const chapter = STORY_CHAPTERS[idx] || STORY_CHAPTERS[0];
                chapterText.textContent = chapter.title;
                if (idx === 4) {
                    questText.textContent = '🏆 Adventure complete! You saved the Grid!';
                }
            }

            function renderMap() {
                const ctx = mapCanvas.getContext('2d');
                const W = mapCanvas.width,
                    H = mapCanvas.height;
                const tw = W / MAP_W,
                    th = H / MAP_H;

                ctx.imageSmoothingEnabled = false;
                ctx.fillStyle = '#1a2a3a';
                ctx.fillRect(0, 0, W, H);

                const cx = advState.playerX * tw + tw / 2;
                const cy = advState.playerY * th + th / 2;
                const viewW = W,
                    viewH = H;
                const offsetX = clamp(cx - viewW / 2, 0, MAP_W * tw - viewW);
                const offsetY = clamp(cy - viewH / 2, 0, MAP_H * th - viewH);

                const map = advState.map;
                const npcs = advState.npcs;

                // Draw tiles
                for (let y = 0; y < MAP_H; y++) {
                    for (let x = 0; x < MAP_W; x++) {
                        const tile = map[y][x];
                        const px = x * tw - offsetX;
                        const py = y * th - offsetY;
                        if (px < -tw || px > W + tw || py < -th || py > H + th) continue;
                        let color = '#2a5a3a';
                        switch (tile) {
                            case MAP_TILES.GRASS:
                                color = (x + y) % 2 === 0 ? '#2a5a3a' : '#2f6240';
                                break;
                            case MAP_TILES.GRASS2:
                                color = (x + y) % 2 === 0 ? '#3a6a4a' : '#3f6f4f';
                                break;
                            case MAP_TILES.PATH:
                                color = '#8a8a6a';
                                break;
                            case MAP_TILES.TREE:
                                color = '#1a3a1a';
                                break;
                            case MAP_TILES.WATER:
                                color = '#1a3a5a';
                                break;
                            case MAP_TILES.STONE:
                                color = '#5a5a5a';
                                break;
                            case MAP_TILES.FLOWER:
                                color = (x + y) % 2 === 0 ? '#2a5a3a' : '#3a6a4a';
                                break;
                            case MAP_TILES.TOWN:
                                color = '#5a4a3a';
                                break;
                            case MAP_TILES.BRIDGE:
                                color = '#6a5a3a';
                                break;
                            default:
                                color = '#2a5a3a';
                        }
                        ctx.fillStyle = color;
                        ctx.fillRect(px, py, tw, th);

                        // Decorative details
                        if (tile === MAP_TILES.FLOWER) {
                            const petalColor = (x + y) % 3 === 0 ? '#f2c14e' : (x + y) % 3 === 1 ? '#e8544b' :
                            '#5be7d9';
                            ctx.fillStyle = petalColor;
                            ctx.fillRect(px + tw / 2 - 2, py + th / 2 - 2, 4, 4);
                            ctx.fillStyle = '#fff';
                            ctx.fillRect(px + tw / 2 - 1, py + th / 2 - 1, 2, 2);
                        } else if (tile === MAP_TILES.TREE) {
                            ctx.fillStyle = '#0a2a0a';
                            ctx.fillRect(px + tw / 2 - 2, py + th / 2, 4, 6);
                            ctx.fillStyle = '#2a6a2a';
                            ctx.fillRect(px + tw / 2 - 5, py + th / 2 - 6, 10, 6);
                            ctx.fillStyle = '#3a7a3a';
                            ctx.fillRect(px + tw / 2 - 3, py + th / 2 - 9, 6, 4);
                            ctx.fillStyle = 'rgba(0,0,0,0.15)';
                            ctx.fillRect(px + tw / 2 - 1, py + th / 2 + 4, 2, 2);
                        } else if (tile === MAP_TILES.WATER) {
                            ctx.fillStyle = 'rgba(100,200,255,0.15)';
                            ctx.fillRect(px + tw / 4, py + th / 4, tw / 2, th / 2);
                            ctx.fillStyle = 'rgba(100,200,255,0.08)';
                            const wave = (x * 7 + y * 13 + Date.now() / 2000) % 20;
                            ctx.fillRect(px + wave, py + th / 3, 4, 2);
                            ctx.fillRect(px + tw - wave, py + th * 2 / 3, 4, 2);
                            const sparkle = (x * 11 + y * 17 + Math.floor(Date.now() / 400)) % 30;
                            if (sparkle < 3) {
                                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                                ctx.fillRect(px + tw / 2 + sparkle * 2, py + th / 3 + sparkle * 3, 2, 2);
                            }
                        } else if (tile === MAP_TILES.STONE) {
                            ctx.fillStyle = '#3a3a3a';
                            ctx.fillRect(px + tw / 4, py + th / 4, tw / 2, th / 2);
                            ctx.fillStyle = '#4a4a4a';
                            ctx.fillRect(px + tw / 3, py + th / 3, tw / 4, th / 4);
                            ctx.fillStyle = '#2a2a2a';
                            ctx.fillRect(px + tw / 2 - 1, py + th / 2 - 1, 2, 2);
                        } else if (tile === MAP_TILES.TOWN) {
                            ctx.fillStyle = '#6a5a4a';
                            ctx.fillRect(px + tw / 2 - 6, py + th / 2 - 4, 12, 8);
                            ctx.fillStyle = '#7a6a5a';
                            ctx.fillRect(px + tw / 2 - 5, py + th / 2 - 3, 10, 6);
                            ctx.fillStyle = '#f2c14e';
                            ctx.fillRect(px + tw / 2 - 1, py + th / 2 - 5, 2, 2);
                            ctx.fillStyle = '#e8544b';
                            ctx.fillRect(px + tw / 2 - 4, py + th / 2 - 5, 2, 2);
                            ctx.fillRect(px + tw / 2 + 2, py + th / 2 - 5, 2, 2);
                        } else if (tile === MAP_TILES.BRIDGE) {
                            ctx.fillStyle = '#6a5a3a';
                            ctx.fillRect(px, py + th / 2 - 2, tw, 4);
                            ctx.fillStyle = '#7a6a4a';
                            ctx.fillRect(px + 2, py + th / 2 - 1, tw - 4, 2);
                            ctx.fillStyle = '#5a4a2a';
                            for (let i = 0; i < 5; i++) {
                                ctx.fillRect(px + 4 + i * 6, py + th / 2 - 3, 2, 2);
                            }
                        }
                    }
                }

                // Draw NPCs with dynamic emote bubbles
                npcs.forEach(npc => {
                    const px = npc.x * tw - offsetX + tw / 2;
                    const py = npc.y * th - offsetY + th / 2 - 4;
                    if (px < -16 || px > W + 16 || py < -16 || py > H + 16) return;
                    const isNear = Math.abs(advState.playerX - npc.x) <= 1.2 && Math.abs(advState.playerY - npc
                        .y) <= 1.2;

                    if (isNear) {
                        ctx.shadowColor = npc.color || '#f2c14e';
                        ctx.shadowBlur = 20;
                    }

                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.beginPath();
                    ctx.arc(px + 2, py + 12, 6, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = npc.color || '#f2c14e';
                    ctx.beginPath();
                    ctx.arc(px, py, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();

                    ctx.shadowBlur = 0;

                    ctx.font = '14px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#000';
                    ctx.fillText(npc.sprite || '?', px, py + 1);

                    // Emote bubble (dynamic interaction)
                    if (isNear && !advState.inDialogue) {
                        const emoteY = py - 22 - 4 * Math.sin(Date.now() / 300);
                        ctx.font = '12px monospace';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'bottom';
                        ctx.fillStyle = 'rgba(0,0,0,0.5)';
                        ctx.fillRect(px - 8, emoteY - 10, 16, 14);
                        ctx.fillStyle = '#fff';
                        ctx.fillRect(px - 7, emoteY - 9, 14, 12);
                        ctx.fillStyle = '#000';
                        ctx.fillText(npc.emote || '💬', px, emoteY + 2);
                    }

                    ctx.font = '6px "Press Start 2P", monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.fillStyle = '#eaf2ff';
                    ctx.shadowColor = '#000';
                    ctx.shadowBlur = 4;
                    ctx.fillText(npc.name, px, py - 12);
                    ctx.shadowBlur = 0;

                    if (isNear) {
                        ctx.strokeStyle = '#f2c14e';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(px, py, 12, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.strokeStyle = 'rgba(242,193,78,0.3)';
                        ctx.lineWidth = 4;
                        ctx.beginPath();
                        ctx.arc(px, py, 16, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                });

                // Player
                const px = advState.playerX * tw - offsetX + tw / 2;
                const py = advState.playerY * th - offsetY + th / 2;
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.beginPath();
                ctx.arc(px + 2, py + 10, 5, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowColor = '#3a6ea5';
                ctx.shadowBlur = 15;
                ctx.fillStyle = '#3a6ea5';
                ctx.beginPath();
                ctx.arc(px, py - 2, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#eaf2ff';
                ctx.fillRect(px - 4, py - 4, 3, 3);
                ctx.fillRect(px + 2, py - 4, 3, 3);
                ctx.fillStyle = '#1a2a3a';
                const eyeOff = advState.facing === 'left' ? -1 : advState.facing === 'right' ? 1 : 0;
                ctx.fillRect(px - 3 + eyeOff, py - 3, 2, 2);
                ctx.fillRect(px + 3 + eyeOff, py - 3, 2, 2);
                ctx.fillStyle = '#e8544b';
                ctx.fillRect(px - 5, py - 9, 10, 3);
                ctx.fillRect(px - 3, py - 12, 6, 4);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.strokeRect(px - 5, py - 9, 10, 3);
                ctx.strokeRect(px - 3, py - 12, 6, 4);

                // Interaction hint
                const nearNpc = npcs.find(n => Math.abs(advState.playerX - n.x) <= 1.2 && Math.abs(advState.playerY - n
                    .y) <= 1.2);
                if (nearNpc && !advState.inDialogue && !battleInProgress) {
                    interactHint.textContent = `[E] TALK — ${nearNpc.name}`;
                    interactHint.style.display = 'block';
                } else if (!advState.inDialogue) {
                    interactHint.style.display = 'none';
                }

                // NPC dialogue bubble
                if (advState.inDialogue && advState.currentNpc) {
                    const npc = advState.currentNpc;
                    const npx = npc.x * tw - offsetX + tw / 2;
                    const npy = npc.y * th - offsetY + th / 2 - 30;
                    if (npx > 0 && npx < W && npy > 0) {
                        const dlg = npc.dialogue[advState.dialogueIndex] || '...';
                        ctx.fillStyle = 'rgba(0,0,0,0.9)';
                        const tw2 = Math.min(dlg.length * 6 + 24, 200);
                        const th2 = 32;
                        const bx = clamp(npx - tw2 / 2, 4, W - tw2 - 4);
                        const by = clamp(npy - th2 - 8, 4, H - th2 - 4);
                        ctx.shadowColor = '#000';
                        ctx.shadowBlur = 10;
                        ctx.fillRect(bx, by, tw2, th2);
                        ctx.shadowBlur = 0;
                        ctx.strokeStyle = '#f2c14e';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(bx, by, tw2, th2);
                        ctx.fillStyle = '#eaf2ff';
                        ctx.font = '9px "VT323", monospace';
                        ctx.textAlign = 'left';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(dlg, bx + 8, by + th2 / 2);
                        ctx.fillStyle = '#f2c14e';
                        ctx.font = '6px "Press Start 2P", monospace';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'bottom';
                        const more = advState.dialogueIndex < npc.dialogue.length - 1 ? '[E] next' : '[E] close';
                        ctx.fillText(more, bx + tw2 / 2, by - 3);
                    }
                }

                // Anomaly indicator with pulse
                if (advState.creaturesDefeated >= 3 && !advState.gameComplete) {
                    const ax = 16 * tw - offsetX + tw / 2;
                    const ay = 12 * th - offsetY + th / 2;
                    if (ax > 0 && ax < W && ay > 0 && ay < H) {
                        const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 300);
                        ctx.fillStyle = `rgba(255,50,50,${0.08 * pulse})`;
                        ctx.beginPath();
                        ctx.arc(ax, ay, 35, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = `rgba(255,50,50,${0.25 * pulse})`;
                        ctx.lineWidth = 2;
                        ctx.setLineDash([4, 8]);
                        ctx.beginPath();
                        ctx.arc(ax, ay, 25, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.setLineDash([]);
                        ctx.strokeStyle = `rgba(255,50,50,${0.1 * pulse})`;
                        ctx.lineWidth = 8;
                        ctx.beginPath();
                        ctx.arc(ax, ay, 30, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.fillStyle = '#ff3b3b';
                        ctx.font = '24px monospace';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.shadowColor = '#ff3b3b';
                        ctx.shadowBlur = 20;
                        ctx.fillText('🌀', ax, ay + 1);
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = '#ff6b6b';
                        ctx.font = '6px "Press Start 2P", monospace';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'bottom';
                        ctx.fillText('ANOMALY', ax, ay - 24);
                        ctx.fillStyle = '#ff6b6b';
                        ctx.font = '6px "VT323", monospace';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'top';
                        ctx.fillText('[E] to challenge', ax, ay + 28);
                    }
                }

                coordText.textContent = `${advState.playerX}, ${advState.playerY}`;
            }

            // ── Interactive NPC dialogue ──
            function interactWithNpc() {
                // Check if near Anomaly
                if (advState.creaturesDefeated >= 3 && !advState.gameComplete) {
                    const dx = Math.abs(advState.playerX - 16);
                    const dy = Math.abs(advState.playerY - 12);
                    if (dx <= 1.5 && dy <= 1.5) {
                        // Start Anomaly battle
                        const anomalyNpc = {
                            id: 'anomaly_battle',
                            name: 'THE ANOMALY',
                            battleName: 'THE ANOMALY',
                            battleVariant: BOSS_TYPE_INDEX,
                            isBoss: true,
                            trigger: 'battle'
                        };
                        startAdventureBattle(anomalyNpc);
                        return;
                    }
                }

                if (advState.inDialogue) {
                    const npc = advState.currentNpc;
                    if (advState.dialogueIndex < npc.dialogue.length - 1) {
                        advState.dialogueIndex++;
                        renderMap();
                        return;
                    } else {
                        // End dialogue
                        advState.inDialogue = false;
                        const npcRef = advState.currentNpc;
                        advState.currentNpc = null;
                        advState.dialogueIndex = 0;

                        // Give item from NPC if applicable
                        if (npcRef.givesItem && !npcRef._gaveItem) {
                            const itemKey = npcRef.givesItem;
                            if (ITEMS[itemKey]) {
                                advState.inventory[itemKey] = (advState.inventory[itemKey] || 0) + 1;
                                npcRef._gaveItem = true;
                                setDialogue('📦 ITEM', `${npcRef.name} gave you a ${ITEMS[itemKey].name}!`, false);
                                sfx('item');
                                updateInventoryHud();
                            }
                        }

                        // Check if this NPC triggers a battle
                        if (npcRef.trigger === 'battle') {
                            const npcInList = advState.npcs.find(n => n.id === npcRef.id);
                            if (npcInList && npcInList.questState === 0) {
                                startAdventureBattle(npcRef);
                                return;
                            } else {
                                setDialogue('💬', `${npcRef.name} has already been defeated!`, false);
                                renderMap();
                                return;
                            }
                        }

                        // Handle quest triggers
                        if (npcRef.trigger === 'start' || npcRef.trigger === 'merchant' ||
                            npcRef.trigger === 'guard' || npcRef.trigger === 'sage') {
                            if (npcRef.id === 'elder' && advState.creaturesDefeated === 0) {
                                setDialogue('📜 QUEST', 'Defeat 3 creatures to find the Anomaly.', false);
                                const elder = advState.npcs.find(n => n.id === 'elder');
                                if (elder) elder.questState = 1;
                            }
                            if (npcRef.id === 'merchant' && advState.creaturesDefeated >= 3) {
                                setDialogue('💰 REWARD', 'You earned a Key Fragment!', false);
                                const merchant = advState.npcs.find(n => n.id === 'merchant');
                                if (merchant) merchant.questState = 2;
                                advState.inventory.key_fragment = (advState.inventory.key_fragment || 0) + 1;
                                sfx('item');
                                updateInventoryHud();
                            }
                            if (npcRef.id === 'guard' && advState.creaturesDefeated >= 3) {
                                setDialogue('🛡️ GUARD', 'You\'re ready for the Anomaly! Find it at the center.',
                                false);
                                const guard = advState.npcs.find(n => n.id === 'guard');
                                if (guard) guard.questState = 2;
                            }
                            if (npcRef.id === 'sage') {
                                setDialogue('🧠 SAGE', 'Remember: (x,y) — x is horizontal, y is vertical!',
                                false);
                                const sage = advState.npcs.find(n => n.id === 'sage');
                                if (sage) sage.questState = 1;
                            }
                        }

                        renderMap();
                        return;
                    }
                }

                // Find nearby NPC
                const nearNpc = advState.npcs.find(n => Math.abs(advState.playerX - n.x) <= 1.2 && Math.abs(advState
                    .playerY - n.y) <= 1.2);
                if (!nearNpc) {
                    setDialogue('🔍 EXPLORE', 'No one nearby. Keep exploring!', false);
                    return;
                }

                // If it's a battle NPC that's already defeated
                if (nearNpc.trigger === 'battle' && nearNpc.questState === 2) {
                    setDialogue('💬', `${nearNpc.name} has been defeated. Move on!`, false);
                    return;
                }

                advState.inDialogue = true;
                advState.currentNpc = nearNpc;
                advState.dialogueIndex = 0;
                renderMap();
                setDialogue('💬 TALK', `Speaking with ${nearNpc.name}...`, false);
                sfx('walk');
            }

            function checkAdventureQuests() {
                if (advState.creaturesDefeated >= 3) {
                    questText.textContent = 'The Anomaly has appeared at the center! Go challenge it!';
                    // Add Anomaly indicator (it's handled in render)
                    updateChapter();
                }
                if (advState.creaturesDefeated >= 3 && advState.gameComplete) {
                    questText.textContent = '🏆 You saved the Grid! Adventure complete!';
                }
            }

            // ── Movement ──
            function movePlayer(dx, dy) {
                if (advState.inDialogue) return;
                if (battleInProgress) return;
                if (advState.moveCooldown > 0) return;
                if (advState.gameComplete) return;

                const newX = advState.playerX + dx;
                const newY = advState.playerY + dy;
                if (newX < 0 || newX >= MAP_W || newY < 0 || newY >= MAP_H) return;
                const tile = advState.map[newY][newX];
                if (tile === MAP_TILES.TREE || tile === MAP_TILES.WATER || tile === MAP_TILES.STONE) return;
                const npcBlock = advState.npcs.some(n => n.x === newX && n.y === newY && n.questState !== 2);
                if (npcBlock) return;

                if (dx < 0) advState.facing = 'left';
                else if (dx > 0) advState.facing = 'right';
                else if (dy < 0) advState.facing = 'up';
                else if (dy > 0) advState.facing = 'down';

                advState.playerX = newX;
                advState.playerY = newY;
                advState.moveCooldown = 5;
                advState.isMoving = true;
                sfx('walk');
                renderMap();
            }

            function updateMovement() {
                if (advState.moveCooldown > 0) {
                    advState.moveCooldown--;
                } else {
                    advState.isMoving = false;
                }

                if (!adventureMode || battleInProgress || advState.inDialogue) return;

                const keys = advState.keys;
                let dx = 0,
                    dy = 0;
                if (keys.left) dx = -1;
                if (keys.right) dx = 1;
                if (keys.up) dy = -1;
                if (keys.down) dy = 1;

                if (dx !== 0 && dy !== 0) {
                    if (Math.abs(dx) > Math.abs(dy)) dy = 0;
                    else dx = 0;
                }

                if (dx !== 0 || dy !== 0) {
                    movePlayer(dx, dy);
                }
            }

            // ── dodge phase ──
            function openDodgePhase(onSuccess) {
                dodgeOverlay.classList.add('show');
                dodgeTitle.textContent = (enemyHp <= Math.ceil(enemyHpMax / 2)) ? '⚡ IT MOVES FASTER NOW' :
                    'SURVIVE THE ONSLAUGHT';
                const boxW = dodgeBox.clientWidth,
                    boxH = dodgeBox.clientHeight;
                let px = boxW / 2 - 7,
                    py = boxH / 2 - 7;
                dodgePlayer.style.left = px + 'px';
                dodgePlayer.style.top = py + 'px';
                dodgePlayer.classList.remove('invuln');

                const keys = {};
                let invuln = false,
                    bolts = [],
                    running = true,
                    timeLeft = 6;
                dodgeTimer.textContent = timeLeft;

                const keydown = (e) => { keys[e.key] = true; };
                const keyup = (e) => { keys[e.key] = false; };
                window.addEventListener('keydown', keydown);
                window.addEventListener('keyup', keyup);

                let pointerActive = false;

                function pointerMove(e) {
                    if (!pointerActive) return;
                    const rect = dodgeBox.getBoundingClientRect();
                    const cx = e.touches ? e.touches[0].clientX : e.clientX;
                    const cy = e.touches ? e.touches[0].clientY : e.clientY;
                    px = clamp(cx - rect.left - 7, 0, boxW - 14);
                    py = clamp(cy - rect.top - 7, 0, boxH - 14);
                    e.preventDefault();
                }

                function pointerDown(e) { pointerActive = true;
                    pointerMove(e); }

                function pointerUp() { pointerActive = false; }
                dodgeBox.addEventListener('pointerdown', pointerDown);
                dodgeBox.addEventListener('pointermove', pointerMove);
                window.addEventListener('pointerup', pointerUp);

                function spawnBolt() {
                    const edge = Math.floor(Math.random() * 4);
                    const fast = enemyHp <= Math.ceil(enemyHpMax / 2);
                    const speed = (fast ? 140 : 100) + Math.random() * 40;
                    let bx, by, vx, vy;
                    if (edge === 0) { bx = -10;
                        by = Math.random() * boxH;
                        vx = speed;
                        vy = (Math.random() - 0.5) * speed * 0.6; } else if (edge === 1) { bx = boxW + 10;
                        by = Math.random() * boxH;
                        vx = -speed;
                        vy = (Math.random() - 0.5) * speed * 0.6; } else if (edge === 2) { bx = Math.random() * boxW;
                        by = -10;
                        vx = (Math.random() - 0.5) * speed * 0.6;
                        vy = speed; } else { bx = Math.random() * boxW;
                        by = boxH + 10;
                        vx = (Math.random() - 0.5) * speed * 0.6;
                        vy = -speed; }
                    const size = 6 + Math.random() * 5;
                    const el = document.createElement('div');
                    el.className = 'dodge-bolt';
                    el.style.width = size + 'px';
                    el.style.height = size + 'px';
                    dodgeBox.appendChild(el);
                    bolts.push({ x: bx, y: by, vx, vy, size, el });
                }
                const boltInterval = (enemyHp <= Math.ceil(enemyHpMax / 2)) ? 220 : 360;
                const boltTimer = setInterval(() => { if (running) spawnBolt(); }, boltInterval);

                let lastT = performance.now();

                function frame(t) {
                    if (!running) return;
                    const dt = Math.min((t - lastT) / 1000, 0.05);
                    lastT = t;
                    const speed = 200;
                    if (keys['ArrowLeft'] || keys['a'] || keys['A']) px -= speed * dt;
                    if (keys['ArrowRight'] || keys['d'] || keys['D']) px += speed * dt;
                    if (keys['ArrowUp'] || keys['w'] || keys['W']) py -= speed * dt;
                    if (keys['ArrowDown'] || keys['s'] || keys['S']) py += speed * dt;
                    px = clamp(px, 0, boxW - 14);
                    py = clamp(py, 0, boxH - 14);
                    dodgePlayer.style.left = px + 'px';
                    dodgePlayer.style.top = py + 'px';

                    for (let i = bolts.length - 1; i >= 0; i--) {
                        const b = bolts[i];
                        b.x += b.vx * dt;
                        b.y += b.vy * dt;
                        b.el.style.left = b.x + 'px';
                        b.el.style.top = b.y + 'px';
                        if (b.x < -20 || b.x > boxW + 20 || b.y < -20 || b.y > boxH + 20) { b.el.remove();
                            bolts.splice(i, 1); continue; }
                        if (!invuln) {
                            const overlap = px < b.x + b.size && px + 14 > b.x && py < b.y + b.size && py + 14 > b
                            .y;
                            if (overlap) {
                                invuln = true;
                                dodgePlayer.classList.add('invuln');
                                playerHp = Math.max(playerHp - 1, 0);
                                updateHud();
                                pulsePlate(playerPlate);
                                flash.classList.remove('go');
                                void flash.offsetWidth;
                                flash.className = 'flash';
                                flash.classList.add('go');
                                setTimeout(() => { invuln = false;
                                    dodgePlayer.classList.remove('invuln'); }, 700);
                                if (playerHp <= 0) { endPhase(false); return; }
                            }
                        }
                    }
                    if (running) requestAnimationFrame(frame);
                }
                requestAnimationFrame(frame);

                const secTimer = setInterval(() => {
                    timeLeft--;
                    dodgeTimer.textContent = Math.max(timeLeft, 0);
                    if (timeLeft <= 0) endPhase(true);
                }, 1000);

                function endPhase(success) {
                    if (!running) return;
                    running = false;
                    clearInterval(boltTimer);
                    clearInterval(secTimer);
                    window.removeEventListener('keydown', keydown);
                    window.removeEventListener('keyup', keyup);
                    dodgeBox.removeEventListener('pointerdown', pointerDown);
                    dodgeBox.removeEventListener('pointermove', pointerMove);
                    window.removeEventListener('pointerup', pointerUp);
                    bolts.forEach(b => b.el.remove());
                    bolts = [];
                    dodgeOverlay.classList.remove('show');
                    if (success && playerHp > 0) { onSuccess(); } else if (playerHp <= 0) {
                        setDialogue('💀 DEFEAT', 'You were overwhelmed!', false);
                        playerHp = PLAYER_HP_SEGMENTS;
                        updateHud();
                        endBattle(false);
                    }
                }
            }

            // ── init player ──
            function initPlayer() {
                drawPlayerSprite(playerCanvas);
                playerCanvas.style.width = '100px';
                playerCanvas.style.height = '100px';
                bounceSprite(playerCanvas);
            }

            // ── tutor ──
            function buildTutorSystemPrompt() {
                const lvl = curLevel();
                let stateLine = 'No battle active.';
                if (currentTarget && battleInProgress) {
                    const [tx, ty] = currentTarget;
                    const quad = lvl.quadrantOnly ? 'Quadrant I' : `Quadrant ${quadrantOf(tx, ty)}`;
                    stateLine =
                        `Current creature "${enemyName.textContent}" at (${fmt(tx,lvl)}, ${fmt(ty,lvl)}) in ${quad}. Enemy HP: ${enemyHp}/${ENEMY_HP_SEGMENTS}. Player HP: ${playerHp}/${PLAYER_HP_SEGMENTS}.`;
                } else if (adventureMode) {
                    stateLine =
                        `Adventure mode: exploring the Lost Grid. Player at (${advState.playerX}, ${advState.playerY}). Creatures defeated: ${advState.creaturesDefeated}/3. Chapter: ${STORY_CHAPTERS[advState.chapterIndex]?.title || 'Prologue'}`;
                }
                return `You are Professor Axis, a friendly retro-RPG tutor inside "Coordinate Battle: The Lost Grid" — a pixel game that teaches the Cartesian plane.

        Give mathematically accurate, clear explanations. Keep answers short (2–4 sentences). Use plain language.

        Game: Level "${lvl.title}" — ${lvl.desc}. ${stateLine}

        If asked for help finding the target, guide them to reason: sign of x (left/right), sign of y (up/down), quadrant.`;
            }

            function addBubble(role, text) {
                const b = document.createElement('div');
                b.className = 'bubble ' + role;
                const tag = document.createElement('span');
                tag.className = 'tag';
                tag.textContent = role === 'tutor' ? 'PROF. AXIS' : 'YOU';
                b.appendChild(tag);
                const body = document.createElement('span');
                body.textContent = text;
                b.appendChild(body);
                tutorLog.appendChild(b);
                tutorLog.scrollTop = tutorLog.scrollHeight;
                return b;
            }

            async function sendTutorMessage() {
                const text = tutorInput.value.trim();
                if (!text || tutorBusy) return;
                tutorInput.value = '';
                addBubble('player', text);
                tutorMessages.push({ role: 'user', content: text });

                tutorBusy = true;
                tutorSend.disabled = true;
                const think = document.createElement('div');
                think.className = 'bubble thinking';
                think.textContent = 'Prof. Axis is thinking…';
                tutorLog.appendChild(think);
                tutorLog.scrollTop = tutorLog.scrollHeight;

                try {
                    const resp = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: 'claude-sonnet-4-6',
                            max_tokens: 1000,
                            system: buildTutorSystemPrompt(),
                            messages: tutorMessages
                        })
                    });
                    const data = await resp.json();
                    const reply = (data.content || []).map(b => b.type === 'text' ? b.text : '').filter(Boolean).join(
                        '\n').trim() || "Comms static… I didn't catch that. Try again?";
                    think.remove();
                    addBubble('tutor', reply);
                    tutorMessages.push({ role: 'assistant', content: reply });
                } catch (_) {
                    think.remove();
                    addBubble('tutor', "Signal lost — try sending that again.");
                } finally {
                    tutorBusy = false;
                    tutorSend.disabled = false;
                    tutorInput.focus();
                }
            }

            // ── SAVE / LOAD ──
            function saveGame() {
                try {
                    const data = {
                        advState: {
                            playerX: advState.playerX,
                            playerY: advState.playerY,
                            facing: advState.facing,
                            creaturesDefeated: advState.creaturesDefeated,
                            inventory: advState.inventory,
                            chapterIndex: advState.chapterIndex,
                            gameComplete: advState.gameComplete,
                            npcs: advState.npcs,
                        },
                        score: score,
                        round: round,
                        playerHp: playerHp,
                        levelIndex: levelIndex,
                        adventureMode: adventureMode,
                    };
                    localStorage.setItem('coordinate_battle_save', JSON.stringify(data));
                    setDialogue('💾 SAVE', 'Game saved successfully!', false);
                    sfx('item');
                } catch (e) {
                    setDialogue('💾 SAVE', 'Failed to save game.', false);
                }
            }

            function loadGame() {
                try {
                    const raw = localStorage.getItem('coordinate_battle_save');
                    if (!raw) { setDialogue('💾 LOAD', 'No save found.', false); return; }
                    const data = JSON.parse(raw);
                    if (data.advState) {
                        advState.playerX = data.advState.playerX || 10;
                        advState.playerY = data.advState.playerY || 8;
                        advState.facing = data.advState.facing || 'down';
                        advState.creaturesDefeated = data.advState.creaturesDefeated || 0;
                        advState.inventory = data.advState.inventory || { health_potion: 1 };
                        advState.chapterIndex = data.advState.chapterIndex || 0;
                        advState.gameComplete = data.advState.gameComplete || false;
                        if (data.advState.npcs) advState.npcs = data.advState.npcs;
                    }
                    if (data.score !== undefined) score = data.score;
                    if (data.round !== undefined) round = data.round;
                    if (data.playerHp !== undefined) playerHp = data.playerHp;
                    if (data.levelIndex !== undefined) levelIndex = data.levelIndex;
                    if (data.adventureMode !== undefined) adventureMode = data.adventureMode;
                    updateHud();
                    updateInventoryHud();
                    if (adventureMode) enterAdventureMode();
                    else spawnEnemy();
                    setDialogue('💾 LOAD', 'Game loaded successfully!', false);
                    sfx('item');
                } catch (e) {
                    setDialogue('💾 LOAD', 'Failed to load save.', false);
                }
            }

            // ── intro ──
            function buildIntroStars() {
                let html = '';
                for (let i = 0; i < 50; i++) {
                    const left = Math.random() * 100,
                        top = Math.random() * 70;
                    const delay = (Math.random() * 3).toFixed(2);
                    html += `<div class="star" style="left:${left}%;top:${top}%;animation-delay:${delay}s;"></div>`;
                }
                introStars.innerHTML = html;
            }

            function buildIntroLevelCards() {
                introLevels.innerHTML = '';
                LEVELS.forEach((lvl, i) => {
                    const card = document.createElement('div');
                    card.className = 'intro-card' + (i === levelIndex ? ' selected' : '');
                    card.innerHTML =
                        `<div class="lv-title">${lvl.chip}</div><div class="lv-desc">${lvl.title} — ${lvl.desc}</div>`;
                    card.addEventListener('click', () => {
                        levelIndex = i;
                        [...introLevels.children].forEach(c => c.classList.remove('selected'));
                        card.classList.add('selected');
                        syncTopBarLevels();
                    });
                    introLevels.appendChild(card);
                });
            }

            function buildTopBarLevels() {
                levelSelect.innerHTML = '';
                LEVELS.forEach((lvl, i) => {
                    const chip = document.createElement('div');
                    chip.className = 'lv-chip' + (i === levelIndex ? ' active' : '');
                    chip.textContent = lvl.chip;
                    chip.addEventListener('click', () => {
                        levelIndex = i;
                        syncTopBarLevels();
                        restartBattle();
                    });
                    levelSelect.appendChild(chip);
                });
            }

            function syncTopBarLevels() {
                [...levelSelect.children].forEach((c, i) => c.classList.toggle('active', i === levelIndex));
                [...introLevels.children].forEach((c, i) => c.classList.toggle('selected', i === levelIndex));
            }

            // ── event wiring ──
            modeAdventure.addEventListener('click', function() {
                document.querySelectorAll('.intro-mode-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                adventureMode = true;
                introStartBtn.textContent = '▶ START ADVENTURE';
            });
            modeBattle.addEventListener('click', function() {
                document.querySelectorAll('.intro-mode-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                adventureMode = false;
                introStartBtn.textContent = '▶ START BATTLE';
            });

            introStartBtn.addEventListener('click', () => {
                const introScreen = document.getElementById('introScreen');
                introScreen.classList.add('hide');
                setTimeout(() => { introScreen.style.display = 'none'; }, 600);
                // Init audio on user interaction
                initAudio();
                // Try to load save
                const hasSave = localStorage.getItem('coordinate_battle_save');
                if (hasSave) {
                    setDialogue('💾', 'Save found! Loading...', false);
                    setTimeout(() => loadGame(), 300);
                } else {
                    restartBattle();
                }
            });

            // ── Keyboard controls ──
            window.addEventListener('keydown', (e) => {
                const key = e.key;

                // Init audio on any keypress
                if (!audioInitialized && (key === 'w' || key === 'W' || key === 'ArrowUp' ||
                        key === 's' || key === 'S' || key === 'ArrowDown' ||
                        key === 'a' || key === 'A' || key === 'ArrowLeft' ||
                        key === 'd' || key === 'D' || key === 'ArrowRight' ||
                        key === 'e' || key === 'E')) {
                    initAudio();
                }

                if (adventureMode && !battleInProgress && !advState.inDialogue) {
                    if (key === 'w' || key === 'W' || key === 'ArrowUp') {
                        e.preventDefault();
                        advState.keys.up = true;
                    }
                    if (key === 's' || key === 'S' || key === 'ArrowDown') {
                        e.preventDefault();
                        advState.keys.down = true;
                    }
                    if (key === 'a' || key === 'A' || key === 'ArrowLeft') {
                        e.preventDefault();
                        advState.keys.left = true;
                    }
                    if (key === 'd' || key === 'D' || key === 'ArrowRight') {
                        e.preventDefault();
                        advState.keys.right = true;
                    }
                    if (key === 'e' || key === 'E') {
                        e.preventDefault();
                        interactWithNpc();
                    }
                    if (key === 'i' || key === 'I') {
                        e.preventDefault();
                        renderFullInventory();
                        inventoryOverlay.classList.add('show');
                    }
                }

                if (key === 'Escape') {
                    if (overlay.classList.contains('show')) closeOverlayFn();
                    if (tutorOverlay.classList.contains('show')) tutorOverlay.classList.remove('show');
                    if (dodgeOverlay.classList.contains('show')) dodgeOverlay.classList.remove('show');
                    if (inventoryOverlay.classList.contains('show')) inventoryOverlay.classList.remove('show');
                    if (advState.inDialogue) {
                        advState.inDialogue = false;
                        advState.currentNpc = null;
                        advState.dialogueIndex = 0;
                        renderMap();
                    }
                }
            });

            window.addEventListener('keyup', (e) => {
                const key = e.key;
                if (key === 'w' || key === 'W' || key === 'ArrowUp') { e.preventDefault();
                    advState.keys.up = false; }
                if (key === 's' || key === 'S' || key === 'ArrowDown') { e.preventDefault();
                    advState.keys.down = false; }
                if (key === 'a' || key === 'A' || key === 'ArrowLeft') { e.preventDefault();
                    advState.keys.left = false; }
                if (key === 'd' || key === 'D' || key === 'ArrowRight') { e.preventDefault();
                    advState.keys.right = false; }
            });

            // ── Touch controls ──
            let touchStartX = 0,
                touchStartY = 0;
            let touchActive = false;

            mapCanvas.addEventListener('touchstart', (e) => {
                if (!audioInitialized) initAudio();
                if (adventureMode && !battleInProgress && !advState.inDialogue) {
                    const t = e.touches[0];
                    touchStartX = t.clientX;
                    touchStartY = t.clientY;
                    touchActive = true;
                }
            }, { passive: true });

            mapCanvas.addEventListener('touchmove', (e) => {
                if (!touchActive || !adventureMode || battleInProgress || advState.inDialogue) return;
                const t = e.touches[0];
                const dx = t.clientX - touchStartX;
                const dy = t.clientY - touchStartY;
                if (Math.abs(dx) > 25 || Math.abs(dy) > 25) {
                    if (Math.abs(dx) > Math.abs(dy)) {
                        movePlayer(dx > 0 ? 1 : -1, 0);
                    } else {
                        movePlayer(0, dy > 0 ? 1 : -1);
                    }
                    touchStartX = t.clientX;
                    touchStartY = t.clientY;
                }
            }, { passive: true });

            mapCanvas.addEventListener('touchend', () => {
                touchActive = false;
                if (adventureMode && !battleInProgress && !advState.inDialogue) {
                    // Check if tap on Anomaly
                    if (advState.creaturesDefeated >= 3 && !advState.gameComplete) {
                        const dx = Math.abs(advState.playerX - 16);
                        const dy = Math.abs(advState.playerY - 12);
                        if (dx <= 1.5 && dy <= 1.5) {
                            const anomalyNpc = {
                                id: 'anomaly_battle',
                                name: 'THE ANOMALY',
                                battleName: 'THE ANOMALY',
                                battleVariant: BOSS_TYPE_INDEX,
                                isBoss: true,
                                trigger: 'battle'
                            };
                            startAdventureBattle(anomalyNpc);
                            return;
                        }
                    }
                    const nearNpc = advState.npcs.find(n => Math.abs(advState.playerX - n.x) <= 1.2 && Math.abs(
                        advState.playerY - n.y) <= 1.2);
                    if (nearNpc) {
                        interactWithNpc();
                    }
                }
                touchStartX = 0;
                touchStartY = 0;
            }, { passive: true });

            // ── Game loop ──
            function gameLoop() {
                updateMovement();
                if (adventureMode && !battleInProgress) {
                    renderMap();
                }
                requestAnimationFrame(gameLoop);
            }

            // ── Button events ──
            attackBtn.addEventListener('click', handleAttack);

            hintBtn.addEventListener('click', () => {
                if (!currentTarget || !battleInProgress) {
                    setDialogue('🔍 SCAN', 'No target to scan.', false);
                    return;
                }
                const lvl = curLevel();
                const q = lvl.quadrantOnly ? 'Quadrant I' : `Quadrant ${quadrantOf(currentTarget[0], currentTarget[1])}`;
                setDialogue('🔍 SCAN',
                    `x=${currentTarget[0]>0?'right':'left'} of origin, y=${currentTarget[1]>0?'above':'below'} (${q}).`
                    );
            });

            nextBtn.addEventListener('click', () => {
                if (battleInProgress && enemyHp <= 0) {
                    endBattle(true);
                } else {
                    if (adventureMode) {
                        enterAdventureMode();
                    } else {
                        round++;
                        if (round > totalRounds) {
                            setDialogue('🏆 COMPLETE', `Battle complete! Final score: ${score}.`, false);
                            attackBtn.disabled = true;
                            hintBtn.disabled = true;
                            nextBtn.disabled = true;
                            return;
                        }
                        spawnEnemy();
                    }
                }
            });

            restartBtn.addEventListener('click', restartBattle);
            closeOverlay.addEventListener('click', closeOverlayFn);
            closeInventoryOverlay.addEventListener('click', () => inventoryOverlay.classList.remove('show'));
            submitTyped.addEventListener('click', submitTypedFn);
            typedInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitTypedFn(); });

            saveBtn.addEventListener('click', saveGame);

            tutorBtn.addEventListener('click', () => {
                tutorOverlay.classList.add('show');
                if (tutorMessages.length === 0) {
                    addBubble('tutor',
                        "Hey trainer! I'm Prof. Axis. Ask me anything about coordinates!");
                }
                tutorInput.focus();
            });
            closeTutorOverlay.addEventListener('click', () => tutorOverlay.classList.remove('show'));
            tutorSend.addEventListener('click', sendTutorMessage);
            tutorInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendTutorMessage(); });

            // ── restart ──
            function restartBattle() {
                score = 0;
                round = 1;
                playerHp = PLAYER_HP_SEGMENTS;
                advState.creaturesDefeated = 0;
                advState.playerX = 10;
                advState.playerY = 8;
                advState.npcs = JSON.parse(JSON.stringify(NPCs));
                advState.inDialogue = false;
                advState.currentNpc = null;
                advState.dialogueIndex = 0;
                advState.keys = { up: false, down: false, left: false, right: false };
                advState.inventory = { health_potion: 2, key_fragment: 0 };
                advState.gameComplete = false;
                advState.chapterIndex = 0;
                mapData = generateMap();
                advState.map = mapData;
                battleTransition.classList.remove('active');
                if (typeParticleTimer) { clearInterval(typeParticleTimer);
                    typeParticleTimer = null; }
                initPlayer();
                if (adventureMode) {
                    enterAdventureMode();
                    questText.textContent = 'Explore the Lost Grid. Defeat 3 creatures to find the Anomaly!';
                    renderMap();
                } else {
                    spawnEnemy();
                }
                updateHud();
                updateInventoryHud();
                attackBtn.disabled = false;
                hintBtn.disabled = false;
                nextBtn.disabled = true;
                battleInProgress = false;
                setDialogue('📜 STORY', 'The Lost Grid awaits. Begin your journey.', false);
            }

            // ── boot ──
            buildIntroStars();
            buildIntroLevelCards();
            buildTopBarLevels();
            initPlayer();
            drawSprite(enemyCanvas, 0, palettes[0]);
            setDialogue('NARRATOR', 'The Lost Grid awaits. Begin your journey.', false);
            updateHud();
            window.addEventListener('resize', () => {});

            // Handle close inventory overlay
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && inventoryOverlay.classList.contains('show')) {
                    inventoryOverlay.classList.remove('show');
                }
            });

            gameLoop();

            console.log('⚡ Coordinate Battle · The Lost Grid — Story & Inventory Edition loaded!');
            console.log('📖 Features: Full story, 8+ NPCs, inventory, save/load, chiptune audio!');
        })();
    </script>
</body>
</html>
