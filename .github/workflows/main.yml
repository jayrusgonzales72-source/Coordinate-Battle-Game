            const MAP_W = 32,
                MAP_H = 24;

            function generateMap() {
                const map = [];
                for (let y = 0; y < MAP_H; y++) {
                    const row = [];
                    for (let x = 0; x < MAP_W; x++) {
                        // Town center
                        if (x >= 8 && x <= 14 && y >= 6 && y <= 10) { row.push(MAP_TILES.TOWN);
                            continue; }
                        // Bridge
                        if (x >= 15 && x <= 18 && y === 8) { row.push(MAP_TILES.BRIDGE);
                            continue; }
                        if (x === 0 || x === MAP_W - 1 || y === 0 || y === MAP_H - 1) { row.push(MAP_TILES.TREE);
                            continue; }
                        if ((x < 5 && y < 5) || (x > MAP_W - 6 && y < 5) || (x < 5 && y > MAP_H - 6) || (x > MAP_W -
                                6 && y > MAP_H - 6)) {
                            row.push(MAP_TILES.WATER);
                            continue;
                        }
                        if (x % 6 === 0 || y % 5 === 0) { row.push(MAP_TILES.PATH);
                            continue; }
                        if (Math.random() < 0.05) { row.push(MAP_TILES.TREE);
                            continue; }
                        if (Math.random() < 0.03) { row.push(MAP_TILES.STONE);
                            continue; }
                        if (Math.random() < 0.07) { row.push(MAP_TILES.FLOWER);
                            continue; }
                        row.push(Math.random() < 0.5 ? MAP_TILES.GRASS : MAP_TILES.GRASS2);
                    }
                    map.push(row);
                }
                return map;
