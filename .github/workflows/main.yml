            <div class="intro-grid"></div>
            <div class="intro-stars" id="introStars"></div>
            <div class="intro-content">
                <div class="intro-logo">COORDINATE<br />BATTLE</div>
                <div class="intro-sub">The Lost Grid · Chapter I</div>
                <div class="intro-mode">
                    <button class="intro-mode-btn active" data-mode="adventure" id="modeAdventure">📜 STORY</button>
                    <button class="intro-mode-btn" data-mode="battle" id="modeBattle">⚔ BATTLE</button>
                </div>
                <div class="intro-panel-title">CHOOSE YOUR DIFFICULTY</div>
                <div class="intro-levels" id="introLevels"></div>
                <button class="intro-start" id="introStartBtn">▶ START ADVENTURE</button>
                <div class="intro-hint">A story-driven journey through the Lost Grid awaits.</div>
            </div>
        </div>

        <!-- TOP BAR -->
        <div class="topbar">
            <div class="levels" id="levelSelect"></div>
            <div class="topbar-right">
                <button class="save-btn" id="saveBtn">💾 SAVE</button>
                <div class="score-tag">SCORE <span id="score">0</span></div>
            </div>
        </div>

        <!-- ARENA -->
        <div class="arena" id="arena">
            <canvas id="mapCanvas" width="600" height="450"></canvas>

            <canvas class="sprite-canvas enemy-sprite" id="enemyCanvas" width="256" height="256"></canvas>
            <canvas class="sprite-canvas player-sprite" id="playerCanvas" width="256" height="256"></canvas>

            <!-- BATTLE TRANSITION -->
            <div class="battle-transition" id="battleTransition">
                <div class="vs-text">⚔ VS ⚔</div>
                <div class="enemy-name-display" id="transitionEnemyName">???</div>
                <div class="vs-sub">— prepare for battle —</div>
            </div>

            <div class="nameplate enemy-plate">
                <div class="row"><span class="name enemy-name" id="enemyName">???</span><span id="enemyLv">Lv1</span></div>
                <div class="hpbar" id="enemyHpBar"></div>
                <div class="hp-label">HP</div>
            </div>
            <div class="nameplate player-plate">
                <div class="row"><span class="name">TRAINER</span><span id="roundTag">R1/8</span></div>
                <div class="hpbar" id="playerHpBar"></div>
                <div class="hp-label">HP</div>
            </div>

            <!-- INVENTORY HUD -->
            <div class="inventory-hud" id="inventoryHud">
                <div class="inv-title">📦 INVENTORY</div>
                <div id="inventoryList"></div>
            </div>

            <div class="adventure-hud" id="adventureHud">
                <div class="quest" id="questDisplay">📜 <span id="questText">Explore the Lost Grid</span></div>
                <div class="story-chapter" id="chapterDisplay">📖 <span id="chapterText">Prologue</span></div>
                <div class="coords" id="coordDisplay">📍 <span id="coordText">0, 0</span></div>
            </div>
            <div class="interact-hint" id="interactHint">[E] TALK</div>
            <div class="adventure-controls">WASD / Arrow Keys · move &nbsp;|&nbsp; E · interact &nbsp;|&nbsp; I · inventory</div>

            <div class="flash" id="flash"></div>
            <div class="vignette"></div>

            <!-- OVERLAYS -->
            <div class="overlay" id="overlay">
                <div class="overlay-title" id="overlayTitle">⚔ CHOOSE SKILL & TARGET</div>
                <div class="skill-select" id="skillSelect"></div>
                <svg id="grid" viewBox="0 0 400 400" width="340" height="340"></svg>
                <div class="typed-panel" id="typedPanel" style="display:none;">
                    <input id="typedInput" type="text" placeholder="x,y" inputmode="decimal" autocomplete="off" />
                    <button id="submitTyped">ATTACK</button>
                </div>
                <button class="close-overlay" id="closeOverlay">‹ BACK</button>
            </div>

            <div class="overlay" id="inventoryOverlay">
                <div class="overlay-title">📦 INVENTORY</div>
                <div id="inventoryFullList" style="width:100%;max-width:380px;background:#0c1526;border:2px solid #1f2d4a;border-radius:4px;padding:12px;min-height:120px;font-family:'VT323',monospace;font-size:16px;color:#eaf2ff;"></div>
                <div style="margin-top:8px;font-size:12px;color:#6d7ea3;">Use items during battle from the skill menu.</div>
                <button class="close-overlay" id="closeInventoryOverlay">‹ BACK</button>
            </div>

            <div class="overlay" id="tutorOverlay">
                <div class="overlay-title">PROF. AXIS — COORDINATE TUTOR</div>
                <div class="tutor-panel">
                    <div class="tutor-header"><div class="tutor-avatar"></div><span style="font-size:13px;color:#9fb0d0;">Ask about quadrants, ordered pairs, or your target.</span></div>
                    <div class="tutor-log" id="tutorLog"></div>
                    <div class="tutor-input-row">
                        <input id="tutorInput" type="text" placeholder="Type your question…" autocomplete="off" />
                        <button id="tutorSend">SEND</button>
                    </div>
                </div>
                <button class="close-overlay" id="closeTutorOverlay">‹ BACK</button>
            </div>

            <div class="overlay" id="dodgeOverlay">
                <div class="overlay-title" id="dodgeTitle">SURVIVE THE ONSLAUGHT</div>
                <div class="dodge-box" id="dodgeBox"><div class="dodge-player" id="dodgePlayer"></div></div>
                <div class="dodge-timer" id="dodgeTimer">6</div>
                <div class="dodge-hint">Arrow keys / drag to move — dodge the shards.</div>
            </div>
        </div>

        <!-- CONSOLE -->
        <div class="console">
            <div class="dialogue" id="dialogue">
                <span class="speaker">NARRATOR:</span>
                <span class="text">The Lost Grid awaits. Begin your journey.</span>
            </div>
            <div class="commands">
                <button class="cmd-btn wide" id="tutorBtn">🎓 ASK PROF. AXIS</button>
                <button class="cmd-btn" id="attackBtn">⚔ ATTACK</button>
                <button class="cmd-btn" id="hintBtn">✦ SCAN</button>
                <button class="cmd-btn" id="nextBtn" disabled>➤ NEXT</button>
                <button class="cmd-btn" id="restartBtn">↻ RESTART</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ── SPLASH ──
            const splashScreen = document.getElementById('splashScreen');

            function hideSplash() {
                if (!splashScreen) return;
                splashScreen.classList.add('hide');
                setTimeout(() => { if (splashScreen.parentNode) splashScreen.style.display = 'none'; }, 800);
            }
            setTimeout(hideSplash, 8000);
            document.addEventListener('click', hideSplash);
            document.addEventListener('keydown', hideSplash);
            document.addEventListener('touchstart', hideSplash);

            // ── LOADING ──
            const percentSpan = document.getElementById('percentText');
            let p = 0;
            const interval = setInterval(() => { p += Math.floor(Math.random() * 4) + 1; if (p > 100) p = 100;
                percentSpan.textContent = p + '%'; if (p >= 100) clearInterval(interval); }, 80);
            const loadingParticles = document.getElementById('loadingParticles');
            for (let i = 0; i < 40; i++) {
                const p2 = document.createElement('div');
                p2.className = 'loading-particle' + (i % 3 === 0 ? ' gold' : '') + (i % 5 === 0 ? ' red' : '');
                p2.style.left = Math.random() * 100 + '%';
                p2.style.top = (10 + Math.random() * 70) + '%';
                const size = 2 + Math.random() * 5;
                p2.style.width = size + 'px';
                p2.style.height = size + 'px';
                const dur = 3 + Math.random() * 4;
                p2.style.animationDuration = dur + 's';
                p2.style.animationDelay = (Math.random() * 3) + 's';
                loadingParticles.appendChild(p2);
            }

            setTimeout(() => {
                const ls = document.getElementById('loadingScreen');
                ls.classList.add('hide');
                setTimeout(() => { ls.style.display = 'none'; }, 900);
                const introScreen = document.getElementById('introScreen');
                introScreen.classList.add('show');
                introScreen.classList.remove('hide');
            }, 9000);

            // ── LEVELS ──
            const LEVELS = [
                { id: 1, chip: 'LV.1 ROOKIE', title: 'Quadrant Rookie', desc: 'Quadrant I only · whole 0–10',
                    range: { min: 0, max: 10 }, gridStep: 1, decimals: false, quadrantOnly: true, mode: 'tap',
                    decoys: 3, minGap: 1 },
                { id: 2, chip: 'LV.2 EXPLORER', title: 'Grid Explorer', desc: 'All quadrants · whole –10 to 10',
                    range: { min: -10, max: 10 }, gridStep: 1, decimals: false, quadrantOnly: false, mode: 'tap',
                    decoys: 4, minGap: 1 },
                { id: 3, chip: 'LV.3 RANGER', title: 'World Map Ranger', desc: 'All quadrants · even –20 to 20',
                    range: { min: -20, max: 20 }, gridStep: 2, decimals: false, quadrantOnly: false, mode: 'tap',
                    decoys: 4, minGap: 2 },
                { id: 4, chip: 'LV.4 PRECISION', title: 'Precision Scout', desc: 'Half-points · decimals like 3.5',
                    range: { min: -10, max: 10 }, gridStep: 1, decimals: true, quadrantOnly: false, mode: 'tap',
                    decoys: 3, minGap: 1.5 },
                { id: 5, chip: 'LV.5 MASTER', title: 'Coordinate Master', desc: 'No tapping · type exact decimals',
                    range: { min: -10, max: 10 }, gridStep: 1, decimals: true, quadrantOnly: false, mode: 'type',
                    decoys: 0, minGap: 0 },
            ];

            // ── DOM refs ──
            const arena = document.getElementById('arena');
            const dialogue = document.getElementById('dialogue');
            const scoreEl = document.getElementById('score');
            const roundTag = document.getElementById('roundTag');
            const enemyName = document.getElementById('enemyName');
            const enemyLv = document.getElementById('enemyLv');
            const enemyHpBar = document.getElementById('enemyHpBar');
            const playerHpBar = document.getElementById('playerHpBar');
            const enemyPlate = document.querySelector('.enemy-plate');
            const playerPlate = document.querySelector('.player-plate');
            const flash = document.getElementById('flash');
            const overlay = document.getElementById('overlay');
            const overlayTitle = document.getElementById('overlayTitle');
            const svg = document.getElementById('grid');
            const typedPanel = document.getElementById('typedPanel');
            const typedInput = document.getElementById('typedInput');
            const attackBtn = document.getElementById('attackBtn');
            const hintBtn = document.getElementById('hintBtn');
            const nextBtn = document.getElementById('nextBtn');
            const restartBtn = document.getElementById('restartBtn');
            const closeOverlay = document.getElementById('closeOverlay');
            const levelSelect = document.getElementById('levelSelect');
            const tutorBtn = document.getElementById('tutorBtn');
            const tutorOverlay = document.getElementById('tutorOverlay');
            const closeTutorOverlay = document.getElementById('closeTutorOverlay');
            const tutorLog = document.getElementById('tutorLog');
            const tutorInput = document.getElementById('tutorInput');
            const tutorSend = document.getElementById('tutorSend');
            const dodgeOverlay = document.getElementById('dodgeOverlay');
            const dodgeTitle = document.getElementById('dodgeTitle');
            const dodgeBox = document.getElementById('dodgeBox');
            const dodgePlayer = document.getElementById('dodgePlayer');
            const dodgeTimer = document.getElementById('dodgeTimer');
            const introLevels = document.getElementById('introLevels');
            const introStartBtn = document.getElementById('introStartBtn');
            const introStars = document.getElementById('introStars');
            const enemyCanvas = document.getElementById('enemyCanvas');
            const playerCanvas = document.getElementById('playerCanvas');
            const submitTyped = document.getElementById('submitTyped');
            const skillSelect = document.getElementById('skillSelect');
            const mapCanvas = document.getElementById('mapCanvas');
            const questText = document.getElementById('questText');
            const chapterText = document.getElementById('chapterText');
            const coordText = document.getElementById('coordText');
            const interactHint = document.getElementById('interactHint');
            const battleTransition = document.getElementById('battleTransition');
            const transitionEnemyName = document.getElementById('transitionEnemyName');
            const inventoryHud = document.getElementById('inventoryHud');
            const inventoryList = document.getElementById('inventoryList');
            const inventoryOverlay = document.getElementById('inventoryOverlay');
            const inventoryFullList = document.getElementById('inventoryFullList');
            const closeInventoryOverlay = document.getElementById('closeInventoryOverlay');
            const saveBtn = document.getElementById('saveBtn');
            const modeAdventure = document.getElementById('modeAdventure');
            const modeBattle = document.getElementById('modeBattle');

            // ── constants ──
            const RES = 256;
            const SCALE = RES / 20;
            const ENEMY_HP_SEGMENTS = 4;
            const BOSS_HP_SEGMENTS = 7;
            const PLAYER_HP_SEGMENTS = 6;
            const NORMAL_TYPE_COUNT = 6;
            const totalRounds = 8;
            const names = ['SPARKITT', 'BUBBLUB', 'LEAFLING', 'EMBERPUP', 'VOLTMEW', 'ROCKBOLD', 'WINDWING', 'GLIMMEW'];

            // ── AUDIO ENGINE (chiptune) ──
            let audioCtx = null;
            let bgMusicInterval = null;
            let bgMusicPlaying = false;
            let audioInitialized = false;

            function initAudio() {
                if (audioInitialized) return;
                try {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                    audioInitialized = true;
                    startBgMusic();
                } catch (e) { /* silent fail */ }
            }

            function playBeep(freq, duration, type = 'square', volume = 0.12) {
                if (!audioCtx) return;
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + duration);
                } catch (e) { /* ignore */ }
            }

            function sfx(type) {
                if (!audioCtx) return;
                switch (type) {
                    case 'spawn':
                        playBeep(400, 0.2, 'square', 0.12);
                        setTimeout(() => playBeep(600, 0.15, 'square', 0.10), 150);
                        break;
                    case 'attack':
                        playBeep(800, 0.1, 'sawtooth', 0.15);
                        setTimeout(() => playBeep(1200, 0.08, 'sawtooth', 0.10), 100);
                        break;
                    case 'hit':
                        playBeep(300, 0.3, 'sawtooth', 0.20);
                        playBeep(200, 0.2, 'square', 0.10);
                        break;
                    case 'walk':
                        playBeep(1000, 0.04, 'square', 0.04);
                        break;
                    case 'ko':
                        playBeep(500, 0.3, 'square', 0.15);
                        setTimeout(() => playBeep(400, 0.3, 'square', 0.12), 200);
                        setTimeout(() => playBeep(300, 0.5, 'square', 0.10), 400);
                        break;
                    case 'logo':
                        playBeep(523, 0.2, 'square', 0.10);
                        setTimeout(() => playBeep(659, 0.2, 'square', 0.10), 200);
                        setTimeout(() => playBeep(784, 0.3, 'square', 0.12), 400);
                        break;
                    case 'item':
                        playBeep(880, 0.1, 'square', 0.10);
                        setTimeout(() => playBeep(1100, 0.15, 'square', 0.08), 120);
                        break;
                    case 'heal':
                        playBeep(600, 0.2, 'sine', 0.10);
                        setTimeout(() => playBeep(800, 0.25, 'sine', 0.08), 150);
                        break;
                    case 'victory':
                        playBeep(523, 0.15, 'square', 0.10);
                        setTimeout(() => playBeep(659, 0.15, 'square', 0.10), 150);
                        setTimeout(() => playBeep(784, 0.2, 'square', 0.12), 300);
                        break;
                }
            }

            function startBgMusic() {
                if (bgMusicPlaying) return;
                bgMusicPlaying = true;
                const notes = [523, 659, 784, 659, 523, 523, 784, 784, 659, 659, 523, 659];
                let idx = 0;
                bgMusicInterval = setInterval(() => {
                    if (!bgMusicPlaying) return;
                    const note = notes[idx % notes.length];
                    playBeep(note, 0.10, 'square', 0.04);
                    idx++;
                    if (idx % 3 === 0) {
                        playBeep(note * 1.25, 0.08, 'sawtooth', 0.02);
                    }
                }, 200);
            }

            function stopBgMusic() {
                bgMusicPlaying = false;
                if (bgMusicInterval) {
                    clearInterval(bgMusicInterval);
                    bgMusicInterval = null;
                }
            }

            // ── STORY CHAPTERS ──
            const STORY_CHAPTERS = [{
                id: 0,
                title: 'Prologue: The Lost Grid',
                text: 'The Coordinate Grid has fallen into chaos. The Anomaly has shattered reality, scattering fragments across the Cartesian plane. You are the chosen Coordinate Master — the only one who can restore order.',
                quest: 'Speak to Elder Oak in the village.'
            }, {
                id: 1,
                title: 'Chapter 1: The Village',
                text: 'You arrive at the village of Gridhaven. The elders speak of three corrupted creatures that guard the fragments. Defeat them to reveal the Anomaly\'s location.',
                quest: 'Defeat the three corrupted creatures: Sparkitt, Bublub, and Leafling.'
            }, {
                id: 2,
                title: 'Chapter 2: The Corrupted',
                text: 'The creatures are twisted by the Anomaly\'s influence. Each one you defeat restores a piece of the Grid. Stay strong — the Anomaly grows more powerful with each fragment you recover.',
                quest: 'Defeat all three creatures to find the Anomaly.'
            }, {
                id: 3,
                title: 'Chapter 3: The Anomaly',
                text: 'The Anomaly has revealed itself at the center of the Grid. It is the living embodiment of chaos — a creature of pure math gone wrong. This is your final test.',
                quest: 'Defeat the Anomaly and restore the Grid!'
            }, {
                id: 4,
                title: 'Epilogue: The Grid Restored',
                text: 'You have defeated the Anomaly and restored the Coordinate Grid. The villagers celebrate your victory. You are now a true Coordinate Master!',
                quest: '🏆 Adventure complete! You saved the Grid!'
            }, ];

            // ── SKILLS ──
            const SKILLS = [
                { id: 'precision', name: 'Precision', damage: 1, description: 'Accurate strike', color: '#5be7d9',
                    emoji: '🎯' },
                { id: 'power', name: 'Power Slash', damage: 2, description: 'Heavy blow (slightly less accurate)',
                    color: '#f2c14e', emoji: '⚡' },
                { id: 'fire', name: 'Fireball', damage: 3, description: 'High damage, low accuracy',
                    color: '#e8544b', emoji: '🔥' },
                { id: 'heal', name: 'Heal', damage: -1, description: 'Restore 1 HP', color: '#6fd67a',
                emoji: '💚' },
            ];

            // ── ITEMS ──
