            // ── sprite drawing ──
            function drawSprite(canvas, variant, palette) {
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = false;
                ctx.clearRect(0, 0, RES, RES);
                const cx = RES / 2,
                    cy = RES / 2 + 2 * SCALE;
                const S = SCALE;
                const shape = variant % 4;
                for (let y = 0; y < RES; y++) {
                    for (let x = 0; x < RES; x++) {
                        const dx = x - cx,
                            dy = y - cy;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        let on = false,
                            isEye = false,
                            isMouth = false,
                            isEar = false;
                        if (shape === 0) { on = dist < 8.2 * S;
                            isEar = (Math.abs(dx) > 5 * S && Math.abs(dx) < 9.5 * S && dy < -3 * S && dy > -9 * S &&
                                Math.abs(Math.abs(dx) - Math.abs(dy)) < 4.5 * S); if (isEar) on = true; } else if (
                            shape === 1) on = dist < 7.8 * S;
                        else if (shape === 2) on = Math.abs(dx) < 7.5 * S && Math.abs(dy) < 7 * S;
                        else on = dy > -7.5 * S && dy < 7.5 * S && Math.abs(dx) < (7.5 * S - dy * 0.5);
                        if (!on) continue;
                        isEye = (dy > -3.5 * S && dy < -0.5 * S) && (Math.abs(Math.abs(dx) - 3.2 * S) < 1.4 * S);
                        isMouth = (dy > 2.2 * S && dy < 4.2 * S && Math.abs(dx) < 2.2 * S);
                        const rim = (dist > (shape === 0 ? 6.6 : shape === 1 ? 6.0 : 5.6) * S - S * 0.5) && !isEar;
                        let color = palette.body;
                        if (isEye) color = '#111';
                        else if (isMouth) color = '#111';
                        else if (rim) color = palette.shade;
                        else if (dx < -2 * S && dy < -2 * S) color = shadeLighten(palette.body, 50);
                        ctx.fillStyle = color;
                        ctx.fillRect(x, y, 1, 1);
                    }
                }
                ctx.fillStyle = palette.shade;
                ctx.fillRect(cx - 6.4 * S, cy + 6.8 * S, 2.6 * S, 3.6 * S);
                ctx.fillRect(cx + 3.8 * S, cy + 6.8 * S, 2.6 * S, 3.6 * S);
                ctx.fillStyle = palette.body;
                ctx.fillRect(cx - 10.2 * S, cy - 1.8 * S, 2.4 * S, 2.8 * S);
                ctx.fillRect(cx + 7.8 * S, cy - 1.8 * S, 2.4 * S, 2.8 * S);
                ctx.fillStyle = palette.accent || palette.shade;
                switch (palette.key) {
                    case 'electric':
                        ctx.fillRect(cx - 3.8 * S, cy - 12 * S, 1.6 * S, 3.8 * S);
                        ctx.fillRect(cx + 2.2 * S, cy - 12.6 * S, 1.6 * S, 4 * S);
                        ctx.fillStyle = '#fff2a8';
                        for (let i = 0; i < 3; i++) ctx.fillRect(cx + 8.4 * S + i * 1.2 * S, cy + 1.6 * S + i * 1.8 *
                            S, 2.2 * S, 1.2 * S);
                        break;
                    case 'water':
                        ctx.fillRect(cx + 8 * S, cy - 2.8 * S, 3.8 * S, 2.4 * S);
                        ctx.fillRect(cx + 9 * S, cy - 4.6 * S, 2.4 * S, 2 * S);
                        break;
                    case 'grass':
                        ctx.fillRect(cx - 1.4 * S, cy - 11.6 * S, 2.8 * S, 4.4 * S);
                        ctx.fillStyle = shadeLighten(palette.body, 50);
                        ctx.fillRect(cx - 3.6 * S, cy - 12.8 * S, 2.8 * S, 2.4 * S);
                        ctx.fillRect(cx + 0.8 * S, cy - 12.8 * S, 2.8 * S, 2.4 * S);
                        break;
                    case 'fire':
                        ctx.fillStyle = '#ffd27a';
                        ctx.fillRect(cx - 1.8 * S, cy - 10.2 * S, 2.2 * S, 3 * S);
                        ctx.fillRect(cx - 0.6 * S, cy - 12.4 * S, 1.8 * S, 2.6 * S);
                        ctx.fillRect(cx - 3.2 * S, cy - 8.6 * S, 1.2 * S, 1.6 * S);
                        ctx.fillRect(cx + 2 * S, cy - 8.6 * S, 1.2 * S, 1.6 * S);
                        break;
                    case 'rock':
                        ctx.fillStyle = palette.shade;
                        ctx.fillRect(cx - 2.8 * S, cy - 9.4 * S, 2.2 * S, 2.6 * S);
                        ctx.fillRect(cx + 0.6 * S, cy - 10.2 * S, 2.2 * S, 2.8 * S);
                        ctx.fillRect(cx - 7.2 * S, cy + 0.2 * S, 2.4 * S, 1.6 * S);
                        ctx.fillRect(cx + 4.8 * S, cy + 0.2 * S, 2.4 * S, 1.6 * S);
                        break;
                    case 'wind':
                        ctx.fillStyle = 'rgba(255,255,255,0.75)';
                        ctx.fillRect(cx - 11.6 * S, cy - 3.4 * S, 3.4 * S, 2.8 * S);
                        ctx.fillRect(cx - 10.6 * S, cy - 0.8 * S, 3 * S, 2.2 * S);
                        ctx.fillRect(cx + 8.2 * S, cy - 3.4 * S, 3.4 * S, 2.8 * S);
                        ctx.fillRect(cx + 7.6 * S, cy - 0.8 * S, 3 * S, 2.2 * S);
                        break;
                    case 'void':
                        ctx.fillStyle = '#0a0510';
                        ctx.fillRect(cx - 5.2 * S, cy - 2.8 * S, 10.4 * S, 3.4 * S);
                        ctx.fillStyle = palette.accent;
                        ctx.fillRect(cx - 3.4 * S, cy - 1.8 * S, 2.6 * S, 2 * S);
                        ctx.fillRect(cx + 0.8 * S, cy - 1.8 * S, 2.6 * S, 2 * S);
                        for (let i = 0; i < 4; i++) ctx.fillRect(cx - 6 * S + i * 3.8 * S, cy + 1.4 * S + (i % 2) *
                            2.4 * S, 1.2 * S, 3.6 * S);
                        ctx.fillStyle = palette.shade;
                        ctx.fillRect(cx - 7.2 * S, cy - 10.6 * S, 1.8 * S, 4 * S);
                        ctx.fillRect(cx + 5.4 * S, cy - 10.6 * S, 1.8 * S, 4 * S);
                        break;
                }
                if (variant % 2 === 0) {
                    ctx.fillStyle = shadeLighten(palette.shade, 30);
                    ctx.fillRect(cx - 5 * S, cy + 4.4 * S, 10 * S, 1.2 * S);
                    ctx.fillRect(cx - 4.2 * S, cy + 5.6 * S, 1.6 * S, 1.6 * S);
                    ctx.fillRect(cx + 2.6 * S, cy + 5.6 * S, 1.6 * S, 1.6 * S);
                }
            }

            function drawPlayerSprite(canvas) {
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = false;
                ctx.clearRect(0, 0, RES, RES);
                const S = SCALE;
                const ox = 10 * S,
                    oy = 11 * S;
                ctx.fillStyle = '#7a4a2a';
                ctx.fillRect(ox - 8 * S, oy + 0.2 * S, 3.6 * S, 6.8 * S);
                ctx.fillStyle = '#5c3620';
                ctx.fillRect(ox - 8 * S, oy + 2.4 * S, 3.6 * S, 1.6 * S);
                ctx.fillRect(ox - 8 * S, oy + 4.8 * S, 3.6 * S, 1.2 * S);
                ctx.fillStyle = '#26364f';
                ctx.fillRect(ox - 4.8 * S, oy + 9 * S, 3.8 * S, 6 * S);
                ctx.fillRect(ox + 1 * S, oy + 9 * S, 3.8 * S, 6 * S);
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(ox - 5.2 * S, oy + 14.4 * S, 4.4 * S, 2.4 * S);
                ctx.fillRect(ox + 0.8 * S, oy + 14.4 * S, 4.4 * S, 2.4 * S);
                ctx.fillStyle = '#3a6ea5';
                ctx.fillRect(ox - 8 * S, oy + 1.2 * S, 2.8 * S, 5.6 * S);
                ctx.fillRect(ox + 5.2 * S, oy + 1.2 * S, 2.8 * S, 5.6 * S);
                ctx.fillStyle = '#f2c9a0';
                ctx.fillRect(ox - 7.8 * S, oy + 6 * S, 2.4 * S, 2.4 * S);
                ctx.fillRect(ox + 5.4 * S, oy + 6 * S, 2.4 * S, 2.4 * S);
                for (let y = 0; y < RES; y++) {
                    for (let x = 0; x < RES; x++) {
                        const dx = x - ox,
                            dy = y - oy;
                        let color = null;
                        if (dy >= -9 * S && dy <= -4.8 * S && Math.abs(dx) <= 5.6 * S) color = '#e8544b';
                        else if (dy > -4.8 * S && dy <= -3.4 * S && Math.abs(dx) <= 6 * S) color = '#8a5a34';
                        else if (dy > -3.4 * S && dy <= 1.2 * S && Math.abs(dx) <= 5 * S) color = '#f2c9a0';
                        else if (dy > 1.2 * S && dy <= 8.8 * S && Math.abs(dx) <= 6 * S) color = '#3a6ea5';
                        else if (dy > -1.8 * S && dy <= 0.4 * S && Math.abs(Math.abs(dx) - 2.2 * S) < 1.2 * S) color =
                            '#111';
                        else if (dy > 2.8 * S && dy < 3.8 * S && Math.abs(dx) < 1.8 * S) color = '#7a3a2a';
                        if (color) { ctx.fillStyle = color;
                            ctx.fillRect(x, y, 1, 1); }
                    }
                }
                ctx.fillStyle = '#2c557f';
                ctx.fillRect(ox - 0.8 * S, oy + 1.6 * S, 1.6 * S, 7 * S);
                ctx.fillStyle = '#e8544b';
                ctx.fillRect(ox - 4.8 * S, oy - 0.8 * S, 9.6 * S, 2 * S);
                ctx.fillRect(ox - 5.6 * S, oy - 2.2 * S, 1.6 * S, 2.4 * S);
                ctx.fillRect(ox + 4 * S, oy - 2.2 * S, 1.6 * S, 2.4 * S);
            }

            // ── HP bar ──
            function renderHpBar(container, total, current, cls) {
                container.innerHTML = '';
                for (let i = 0; i < total; i++) {
                    const seg = document.createElement('div');
                    seg.className = 'seg' + (i < current ? ` on ${cls}` : '');
                    container.appendChild(seg);
                }
            }

            // ── coordinates ──
            function randomCoord(lvl) {
                const unit = lvl.decimals ? 0.5 : lvl.gridStep;
                const { min, max } = lvl.range;
                const steps = Math.round((max - min) / unit);

                function pickAxis(positiveOnly) {
                    let v, guard = 0;
                    do { const n = randInt(0, steps);
                        v = min + n * unit;
                        guard++; } while ((Math.abs(v) < unit / 2 || (positiveOnly && v <= 0)) && guard < 80);
                    return Math.round(v * 10) / 10;
                }
                const x = pickAxis(lvl.quadrantOnly);
                const y = pickAxis(lvl.quadrantOnly);
                return [x, y];
            }

            function toPixel(x, y, lvl) {
                const pad = 34,
                    span = lvl.range.max - lvl.range.min,
                    usable = 400 - pad * 2;
                const px = pad + (x - lvl.range.min) / span * usable;
                const py = 400 - (pad + (y - lvl.range.min) / span * usable);
                return [px, py];
            }

            function drawGrid(lvl) {
                let html = '';
                const pad = 34;
                for (let v = lvl.range.min; v <= lvl.range.max; v += lvl.gridStep) {
                    const [px] = toPixel(v, 0, lvl);
                    const [, py] = toPixel(0, v, lvl);
                    html += `<line x1="${px}" y1="${pad}" x2="${px}" y2="${400-pad}" class="gridline"/>`;
                    html += `<line x1="${pad}" y1="${py}" x2="${400-pad}" y2="${py}" class="gridline"/>`;
                }
                const [zx] = toPixel(0, 0, lvl);
                const [, zy] = toPixel(0, 0, lvl);
                html += `<line x1="${pad}" y1="${zy}" x2="${400-pad}" y2="${zy}" class="axisline"/>`;
                html += `<line x1="${zx}" y1="${pad}" x2="${zx}" y2="${400-pad}" class="axisline"/>`;
                for (let v = lvl.range.min; v <= lvl.range.max; v += lvl.gridStep) {
                    if (v === 0 && lvl.range.min < 0) continue;
                    const [px] = toPixel(v, 0, lvl);
                    html += `<text x="${px}" y="${zy+24}" class="tick-label" text-anchor="middle">${v}</text>`;
                    const [, py] = toPixel(0, v, lvl);
                    html += `<text x="${zx-16}" y="${py+6}" class="tick-label" text-anchor="end">${v}</text>`;
                }
                html += `<text x="${zx-16}" y="${zy+24}" class="tick-label" text-anchor="end">0</text>`;
                svg.innerHTML = html;
            }

            function spawnDecoys(tx, ty, lvl) {
                const coords = [
                    [tx, ty]
                ];
                const need = lvl.decoys;
                let guard = 0;
                while (coords.length <= need && guard < 500) {
                    guard++;
                    const c = randomCoord(lvl);
                    const tooClose = coords.some(([x, y]) => Math.abs(x - c[0]) < lvl.minGap && Math.abs(y - c[1]) <
                        lvl.minGap);
                    if (!tooClose) coords.push(c);
                }
                return coords;
            }

            function renderGridCreatures(coords, targetIndex, lvl) {
                let html = svg.innerHTML;
                coords.forEach(([x, y], i) => {
                    const [px, py] = toPixel(x, y, lvl);
                    const pal = palettes[i % palettes.length];
                    const s = 30;
                    html +=
                        `<g class="creature-target" data-x="${x}" data-y="${y}" data-target="${i===targetIndex}" transform="translate(${px-s/2},${py-s/2})">
                <rect class="body" width="${s}" height="${s}" fill="${pal.body}" stroke="${pal.shade}" stroke-width="2.5" rx="3"/>
                <rect x="${s*0.28}" y="${s*0.30}" width="3.5" height="3.5" fill="#111" rx="1"/>
                <rect x="${s*0.62}" y="${s*0.30}" width="3.5" height="3.5" fill="#111" rx="1"/>
                ${i===targetIndex ? `<rect x="4" y="${s-10}" width="${s-8}" height="4" fill="#f2c14e" rx="1"/>` : ''}
            </g>`;
                });
                svg.innerHTML = html;
                svg.querySelectorAll('.creature-target').forEach(el => {
                    el.addEventListener('click', () => handleGridGuess(el));
                    el.addEventListener('touchend', (e) => { e.preventDefault();
                        handleGridGuess(el); });
                });
            }

            // ── Battle functions ──
            function updateHud() {
                scoreEl.textContent = score;
                roundTag.textContent = battleInProgress ? `R${Math.min(round,totalRounds)}/${totalRounds}` : 'ADV';
                renderHpBar(enemyHpBar, enemyHpMax, enemyHp, 'enemy');
