<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Coordinate Battle · The Lost Grid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            image-rendering: pixelated;
            -webkit-tap-highlight-color: transparent;
        }
        html,
        body {
            height: 100%;
            margin: 0;
            background: #080c18;
            font-family: 'VT323', monospace;
            color: #eaf2ff;
            touch-action: manipulation;
            overflow: hidden;
        }
        .pixel-font {
            font-family: 'Press Start 2P', monospace;
        }

        .device {
            width: 100%;
            max-width: 540px;
            margin: 0 auto;
            background: #0b0f1a;
            border: 3px solid #1f2d4a;
            border-radius: 18px 18px 12px 12px;
            box-shadow: 0 0 0 2px #000, 0 20px 60px rgba(0, 0, 0, 0.85), inset 0 0 60px rgba(0, 20, 40, 0.4);
            position: relative;
            overflow: hidden;
            height: 100vh;
            max-height: 900px;
            display: flex;
            flex-direction: column;
        }

        /* SPLASH */
        .splash-screen {
            position: absolute;
            inset: 0;
            z-index: 400;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #080c18;
            transition: opacity 0.8s ease, transform 0.8s ease;
            padding: 20px;
            pointer-events: all;
        }
        .splash-screen.hide {
            opacity: 0;
            transform: scale(1.08);
            pointer-events: none;
        }
        .splash-content {
            text-align: center;
            max-width: 400px;
        }
        .splash-logo {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(36px, 12vw, 64px);
            color: #f2c14e;
            text-shadow: 0 0 30px #f2c14e, 0 0 60px rgba(242, 193, 78, 0.5), 4px 4px 0 #000;
            animation: splashPulse 2.2s ease-in-out infinite;
            line-height: 1.2;
            letter-spacing: 2px;
        }
        .splash-sub {
            font-family: 'VT323', monospace;
            font-size: 18px;
            color: #5be7d9;
            margin-top: 8px;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(91, 231, 217, 0.3);
        }
        .splash-version {
            font-size: 10px;
            color: #4d5e7a;
            margin-top: 20px;
            letter-spacing: 1px;
            opacity: 0.5;
        }
        .splash-hint {
            font-family: 'VT323', monospace;
            font-size: 12px;
            color: #6d7ea3;
            margin-top: 24px;
            animation: hintPulse 1.8s ease-in-out infinite;
            letter-spacing: 1px;
        }
        @keyframes splashPulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
                text-shadow: 0 0 30px #f2c14e, 0 0 60px rgba(242, 193, 78, 0.5), 4px 4px 0 #000;
            }
            50% {
                transform: scale(1.04);
                opacity: .95;
                text-shadow: 0 0 50px #f2c14e, 0 0 100px rgba(242, 193, 78, 0.7), 4px 4px 0 #000;
            }
        }
        @keyframes hintPulse {
            0%,
            100% {
                opacity: .4;
            }
            50% {
                opacity: 1;
            }
        }

        /* LOADING */
        .loading-screen {
            position: absolute;
            inset: 0;
            z-index: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 50% 30%, #0d0b1a, #020208 90%);
            transition: opacity 0.9s ease, transform 0.9s cubic-bezier(.34, 1.56, .64, 1);
            padding: 20px;
            overflow: hidden;
        }
        .loading-screen.hide {
            opacity: 0;
            transform: scale(1.08);
            pointer-events: none;
        }
        .loading-bg-grid {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle at 20% 30%, rgba(91, 231, 217, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(242, 193, 78, 0.04) 0%, transparent 50%),
                repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(91, 231, 217, 0.02) 40px, rgba(91, 231, 217, 0.02) 41px);
            animation: driftGrid 25s linear infinite;
            opacity: 0.8;
        }
        @keyframes driftGrid {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 100px 100px;
            }
        }
        .loading-rings {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .loading-ring {
            position: absolute;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-style: solid;
            animation: spinRing linear infinite;
            filter: blur(1px);
        }
        .loading-ring:nth-child(1) {
            width: 200px;
            height: 200px;
            border-width: 2px;
            border-color: rgba(91, 231, 217, 0.25);
            animation-duration: 16s;
            box-shadow: 0 0 30px rgba(91, 231, 217, 0.1);
        }
        .loading-ring:nth-child(2) {
            width: 280px;
            height: 280px;
            border-width: 3px;
            border-color: rgba(242, 193, 78, 0.15);
            animation-duration: 24s;
            animation-direction: reverse;
            border-style: dashed;
        }
        .loading-ring:nth-child(3) {
            width: 360px;
            height: 360px;
            border-width: 4px;
            border-color: rgba(232, 84, 75, 0.10);
            animation-duration: 32s;
            border-style: dotted;
            filter: blur(2px);
        }
        .loading-ring:nth-child(4) {
            width: 440px;
            height: 440px;
            border-width: 1px;
            border-color: rgba(91, 231, 217, 0.08);
            animation-duration: 40s;
            animation-direction: alternate;
            border-style: solid;
        }
        @keyframes spinRing {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
        .loading-particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .loading-particle {
            position: absolute;
            border-radius: 50%;
            background: #5be7d9;
            box-shadow: 0 0 12px #5be7d9;
            animation: floatParticle linear infinite;
        }
        .loading-particle.gold {
            background: #f2c14e;
            box-shadow: 0 0 12px #f2c14e;
        }
        .loading-particle.red {
            background: #e8544b;
            box-shadow: 0 0 12px #e8544b;
        }
        @keyframes floatParticle {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0.9;
            }
            100% {
                transform: translateY(-180px) translateX(40px) scale(0);
                opacity: 0;
            }
        }
        .loading-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        .loading-logo {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(28px, 9vw, 52px);
            color: #f2c14e;
            text-shadow: 0 0 30px #f2c14e, 0 0 80px rgba(242, 193, 78, 0.5), 4px 4px 0 #000, 0 8px 40px rgba(0, 0, 0, 0.8);
            animation: logoPulseLoad 2.2s ease-in-out infinite;
            line-height: 1.1;
            margin-bottom: 4px;
            letter-spacing: 2px;
        }
        @keyframes logoPulseLoad {
            0%,
            100% {
                text-shadow: 0 0 30px #f2c14e, 0 0 80px rgba(242, 193, 78, 0.5), 4px 4px 0 #000, 0 8px 40px rgba(0, 0, 0, 0.8);
                color: #f2c14e;
            }
            50% {
                text-shadow: 0 0 50px #f2c14e, 0 0 120px rgba(242, 193, 78, 0.7), 4px 4px 0 #000, 0 8px 60px rgba(0, 0, 0, 0.9);
                color: #ffd966;
            }
        }
        .loading-sub {
            font-family: 'VT323', monospace;
            font-size: 18px;
            color: #9fb0d0;
            letter-spacing: 3px;
            margin-top: 2px;
            text-shadow: 0 0 10px rgba(91, 231, 217, 0.3);
            animation: flicker 3s step-end infinite;
        }
        @keyframes flicker {
            0%,
            100% {
                opacity: 1
            }
            2% {
                opacity: 0.2
            }
            4% {
                opacity: 1
            }
            6% {
                opacity: 0.5
            }
            8% {
                opacity: 1
            }
            50% {
                opacity: 1
            }
            52% {
                opacity: 0.1
            }
            54% {
                opacity: 1
            }
        }
        .loading-gauge {
            width: 220px;
            max-width: 70vw;
            height: 12px;
            background: #0a0a18;
            border: 2px solid #1f2d4a;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 16px;
            box-shadow: 0 0 20px rgba(91, 231, 217, 0.15), inset 0 0 10px rgba(0, 0, 0, 0.6);
            position: relative;
        }
        .loading-gauge-inner {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #5be7d9, #f2c14e, #e8544b);
            animation: loadBar 3.2s cubic-bezier(.4, 0, .2, 1) forwards;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(242, 193, 78, 0.4);
            position: relative;
        }
        .loading-gauge-inner::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: gaugeShine 1.5s ease-in-out infinite;
        }
        @keyframes gaugeShine {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }
        @keyframes loadBar {
            0% {
                width: 0%;
            }
            100% {
                width: 100%;
            }
        }
        .loading-percent {
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            color: #f2c14e;
            margin-top: 6px;
            text-shadow: 0 0 12px rgba(242, 193, 78, 0.4);
            letter-spacing: 1px;
        }
        .loading-status {
            font-family: 'VT323', monospace;
            font-size: 14px;
            color: #6d7ea3;
            margin-top: 10px;
            letter-spacing: 2px;
            animation: statusPulse 2s ease-in-out infinite;
        }
        @keyframes statusPulse {
            0%,
            100% {
                opacity: 0.6
            }
            50% {
                opacity: 1
            }
        }
        .loading-version {
            font-size: 10px;
            color: #4d5e7a;
            margin-top: 14px;
            letter-spacing: 1px;
            opacity: 0.5;
        }

        /* INTRO */
        .intro {
            position: absolute;
            inset: 0;
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 18px 14px 16px;
            background: radial-gradient(ellipse at 50% 20%, #1a345a, #0a1222 70%, #04080f);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(.34, 1.56, .64, 1);
        }
        .intro.show {
            display: flex;
            opacity: 1;
            transform: scale(1);
        }
        .intro.hide {
            opacity: 0;
            transform: scale(1.06);
            pointer-events: none;
        }
        .intro-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(91, 231, 217, 0.06) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(91, 231, 217, 0.06) 1px, transparent 1px);
            background-size: 28px 28px;
            animation: driftGrid 18s linear infinite;
        }
        .intro-stars {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2.8s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.15
            }
            50% {
                opacity: 1
            }
        }
        .intro-content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 440px;
        }
        .intro-logo {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(20px, 5.8vw, 34px);
            color: #5be7d9;
            text-align: center;
            letter-spacing: 2px;
            margin-top: 4px;
            text-shadow: 0 0 10px #5be7d9, 0 0 30px rgba(91, 231, 217, 0.5), 4px 4px 0 #000;
            animation: logoPulse 2.6s ease-in-out infinite;
            line-height: 1.3;
        }
        @keyframes logoPulse {
            0%,
            100% {
                text-shadow: 0 0 10px #5be7d9, 0 0 30px rgba(91, 231, 217, 0.5), 4px 4px 0 #000;
                color: #5be7d9;
            }
            50% {
                text-shadow: 0 0 16px #f2c14e, 0 0 40px rgba(242, 193, 78, 0.6), 4px 4px 0 #000;
                color: #f2c14e;
            }
        }
        .intro-sub {
            font-size: 15px;
            color: #9fb0d0;
            margin: 8px 0 14px;
            text-align: center;
            letter-spacing: 0.5px;
        }
        .intro-panel-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: #f2c14e;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .intro-levels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
            width: 100%;
            max-width: 480px;
        }
        .intro-card {
            background: rgba(16, 25, 43, 0.92);
            border: 2px solid #2a3a5c;
            padding: 8px 9px;
            cursor: pointer;
            text-align: left;
            transition: border-color 0.2s, transform 0.3s cubic-bezier(.34, 1.56, .64, 1), background 0.2s;
            border-radius: 4px;
        }
        .intro-card:hover {
            border-color: #2c8a7f;
            transform: translateY(-2px) scale(1.02);
        }
        .intro-card.selected {
            border-color: #f2c14e;
            background: rgba(242, 193, 78, 0.10);
            transform: scale(1.04);
            box-shadow: 0 0 20px rgba(242, 193, 78, 0.15);
        }
        .intro-card .lv-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: #5be7d9;
            margin-bottom: 3px;
        }
        .intro-card.selected .lv-title {
            color: #f2c14e;
        }
        .intro-card .lv-desc {
            font-size: 13px;
            color: #b9c6e0;
            line-height: 1.3;
        }
        .intro-mode {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 6px 0 14px;
        }
        .intro-mode-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            background: transparent;
            color: #9fb0d0;
            border: 2px solid #2a3a5c;
            padding: 6px 14px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
        }
        .intro-mode-btn.active {
            background: #f2c14e;
            color: #000;
            border-color: #f2c14e;
            box-shadow: 0 0 20px rgba(242, 193, 78, 0.3);
        }
        .intro-start {
            margin-top: 16px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            background: #f2c14e;
            color: #1a1305;
            border: none;
            padding: 14px 28px;
            cursor: pointer;
            box-shadow: 0 0 0 3px #000, 0 0 30px rgba(242, 193, 78, 0.5);
            animation: startPulse 1.8s cubic-bezier(.34, 1.56, .64, 1) infinite;
            transition: transform 0.15s cubic-bezier(.34, 1.56, .64, 1);
            border-radius: 4px;
            letter-spacing: 1px;
        }
        .intro-start:active {
            transform: scale(0.92);
        }
        @keyframes startPulse {
            0%,
            100% {
                transform: scale(1)
            }
            50% {
                transform: scale(1.06)
            }
        }
        .intro-hint {
            margin-top: 10px;
            font-size: 12px;
            color: #6d7ea3;
            text-align: center;
        }

        /* TOP BAR */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #050810;
            padding: 6px 10px;
            border-bottom: 2px solid #1f2d4a;
            font-size: 10px;
            flex-shrink: 0;
            min-height: 44px;
            gap: 6px;
            flex-wrap: wrap;
        }
        .levels {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .lv-chip {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            background: #0b0f1a;
            color: #9fb0d0;
            border: 2px solid #1f2d4a;
            padding: 4px 6px;
            cursor: pointer;
            transition: transform 0.25s cubic-bezier(.34, 1.56, .64, 1), background 0.2s, border-color 0.2s;
            border-radius: 3px;
            white-space: nowrap;
        }
        .lv-chip:hover {
            transform: translateY(-1px) scale(1.05);
        }
        .lv-chip.active {
            color: #000;
            background: #f2c14e;
            border-color: #f2c14e;
            transform: scale(1.08);
        }
        .topbar-right {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .score-tag {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: #f2c14e;
            white-space: nowrap;
            background: #0b0f1a;
            padding: 3px 8px;
            border: 2px solid #1f2d4a;
            border-radius: 3px;
        }
        .score-tag span {
            color: #fff;
        }
        .save-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 6px;
            background: #1a2a1c;
            color: #6fd67a;
            border: 2px solid #3a5a2a;
            padding: 3px 8px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
        }
        .save-btn:hover {
            background: #223a24;
            border-color: #6fd67a;
        }
        .save-btn:active {
            transform: scale(0.92);
        }

        /* ARENA */
        .arena {
            position: relative;
            flex: 1;
            min-height: 220px;
            overflow: hidden;
            background: #0c1526;
            touch-action: none;
        }
        .arena::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            box-shadow: inset 0 0 80px 30px rgba(0, 0, 0, 0.5);
            z-index: 5;
        }

        #mapCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            z-index: 2;
            touch-action: none;
            background: #1a2a3a;
            display: block;
        }

        .sprite-canvas {
            position: absolute;
            z-index: 3;
            filter: drop-shadow(0 4px 20px rgba(0, 0, 0, 0.5));
            touch-action: none;
            pointer-events: none;
            transition: transform 0.3s cubic-bezier(.34, 1.56, .64, 1);
            display: none;
        }
        .enemy-sprite {
            top: 38px;
            right: 40px;
            animation: floaty 2.4s ease-in-out infinite;
            width: 120px;
            height: 120px;
        }
        .player-sprite {
            bottom: 20px;
            left: 30px;
            animation: floaty 2.8s ease-in-out infinite;
            width: 100px;
            height: 100px;
        }
        @keyframes floaty {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }
        .sprite-canvas.hit {
            animation: hitshake 0.4s;
            filter: brightness(2) saturate(0) drop-shadow(0 0 30px rgba(255, 255, 255, 0.6));
        }
        @keyframes hitshake {
            0%,
            100% {
                transform: translateX(0) rotate(0)
            }
            20% {
                transform: translateX(-10px) rotate(-3deg)
            }
            40% {
                transform: translateX(10px) rotate(3deg)
            }
            60% {
                transform: translateX(-6px) rotate(-2deg)
            }
            80% {
                transform: translateX(6px) rotate(2deg)
            }
        }
        .sprite-canvas.faint {
            animation: faintdrop 0.7s forwards;
        }
        @keyframes faintdrop {
            to {
                transform: translateY(60px) scale(0.6);
                opacity: 0;
            }
        }
        .sprite-canvas.spawn-in {
            animation: spriteBounceIn 0.6s cubic-bezier(.34, 1.56, .64, 1);
        }
        @keyframes spriteBounceIn {
            0% {
                transform: translateY(-40px) scale(0.3);
                opacity: 0;
            }
            55% {
                transform: translateY(8px) scale(1.10);
                opacity: 1;
            }
            75% {
                transform: translateY(-4px) scale(0.96);
            }
            100% {
                transform: translateY(0) scale(1);
            }
        }
        .player-sprite.dash {
            animation: playerDash 0.4s cubic-bezier(.34, 1.56, .64, 1) forwards;
        }
        @keyframes playerDash {
            0% {
                transform: translateX(0) scale(1);
            }
            40% {
                transform: translateX(70px) scale(1.2);
            }
            100% {
                transform: translateX(0) scale(1);
            }
        }
        .enemy-sprite.recoil {
            animation: enemyRecoil 0.4s cubic-bezier(.34, 1.56, .64, 1) forwards;
        }
        @keyframes enemyRecoil {
            0% {
                transform: translateX(0);
            }
            30% {
                transform: translateX(-40px) scale(0.8);
            }
            100% {
                transform: translateX(0) scale(1);
            }
        }

        .nameplate {
            position: absolute;
            background: rgba(11, 15, 26, 0.92);
            border: 2px solid #1f2d4a;
            padding: 5px 9px;
            min-width: 130px;
            z-index: 4;
            border-radius: 4px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            display: none;
        }
        .nameplate.enemy-plate {
            top: 10px;
            left: 10px;
        }
        .nameplate.player-plate {
            bottom: 10px;
            right: 10px;
        }
        .nameplate .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 3px;
        }
        .nameplate .name {
            font-size: 11px;
            letter-spacing: 0.5px;
            color: #eaf2ff;
        }
        .nameplate .name.enemy-name {
            color: #ff6b6b;
        }
        .hpbar {
            display: flex;
            gap: 2px;
            height: 8px;
            background: #000;
            padding: 1px;
            border: 2px solid #000;
            border-radius: 2px;
        }
        .hpbar .seg {
            flex: 1;
            background: #1f2d4a;
            border-radius: 1px;
            transition: background 0.3s;
        }
        .hpbar .seg.on.enemy {
            background: #e8544b;
        }
        .hpbar .seg.on.player {
            background: #6fd67a;
        }
        .hp-label {
            font-size: 9px;
            color: #9fb0d0;
            margin-top: 1px;
            letter-spacing: 0.5px;
        }
        .nameplate.pulse {
            animation: platePulse 0.35s cubic-bezier(.34, 1.56, .64, 1);
        }
        @keyframes platePulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.10);
            }
            100% {
                transform: scale(1);
            }
        }

        /* INVENTORY HUD */
        .inventory-hud {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #1f2d4a;
            border-radius: 4px;
            padding: 4px 8px;
            display: none;
            min-width: 80px;
            font-family: 'Press Start 2P', monospace;
            font-size: 6px;
            color: #eaf2ff;
            pointer-events: none;
        }
        .arena.adventure-mode .inventory-hud {
            display: block;
        }
        .inventory-hud .inv-title {
            color: #f2c14e;
            font-size: 5px;
            text-align: center;
            margin-bottom: 3px;
            border-bottom: 1px solid #1f2d4a;
            padding-bottom: 2px;
        }
        .inventory-hud .inv-item {
            display: flex;
            justify-content: space-between;
            padding: 1px 0;
            font-size: 6px;
            gap: 6px;
        }
        .inventory-hud .inv-item .qty {
            color: #5be7d9;
        }

        .adventure-hud {
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 10;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: #eaf2ff;
            text-shadow: 2px 2px 0 #000;
            display: none;
            pointer-events: none;
        }
        .arena.adventure-mode .adventure-hud {
            display: block;
        }
        .adventure-hud .quest {
            background: rgba(0, 0, 0, 0.85);
            padding: 5px 10px;
            border: 2px solid #f2c14e;
            border-radius: 3px;
            max-width: 200px;
            font-size: 7px;
            line-height: 1.5;
            color: #f2c14e;
            text-shadow: none;
        }
        .adventure-hud .quest span {
            color: #eaf2ff;
        }
        .adventure-hud .coords {
            background: rgba(0, 0, 0, 0.75);
            padding: 3px 8px;
            border: 1px solid #1f2d4a;
            border-radius: 3px;
            margin-top: 4px;
            font-size: 7px;
            color: #5be7d9;
        }
        .adventure-hud .story-chapter {
            background: rgba(0, 0, 0, 0.75);
            padding: 3px 8px;
            border: 1px solid #f2c14e;
            border-radius: 3px;
            margin-top: 4px;
            font-size: 6px;
            color: #f2c14e;
            max-width: 200px;
        }

        .interact-hint {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            color: #f2c14e;
            background: rgba(0, 0, 0, 0.85);
            padding: 4px 14px;
            border: 2px solid #f2c14e;
            border-radius: 4px;
            animation: pulseHint 1.2s ease-in-out infinite;
            display: none;
            pointer-events: none;
            white-space: nowrap;
        }
        .arena.adventure-mode .interact-hint {
            display: block;
        }
        @keyframes pulseHint {
            0%,
            100% {
                opacity: 0.6;
                transform: translateX(-50%) scale(0.98)
            }
            50% {
                opacity: 1;
                transform: translateX(-50%) scale(1.04)
            }
        }

        .adventure-controls {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 8;
            display: none;
            gap: 6px;
            font-size: 10px;
            color: #6d7ea3;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid #1f2d4a;
            font-family: 'VT323', monospace;
            pointer-events: none;
        }
        .arena.adventure-mode .adventure-controls {
            display: flex;
        }

        .flash {
            position: absolute;
            inset: 0;
            background: #e8544b;
            opacity: 0;
            pointer-events: none;
            z-index: 6;
        }
        .flash.go {
            animation: flashHit 0.35s;
        }
        @keyframes flashHit {
            0% {
                opacity: 0.5;
            }
            100% {
                opacity: 0;
            }
        }
        .flash.gold {
            background: #f2c14e;
        }
        .flash.gold.go {
            animation: flashGold 0.4s;
        }
        @keyframes flashGold {
            0% {
                opacity: 0.5;
            }
            100% {
                opacity: 0;
            }
        }

        /* BATTLE TRANSITION */
        .battle-transition {
            position: absolute;
            inset: 0;
            z-index: 20;
            pointer-events: none;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0);
            transition: background 0.4s ease;
        }
        .battle-transition.active {
            display: flex;
            background: rgba(0, 0, 0, 0.85);
            pointer-events: all;
        }
        .battle-transition .vs-text {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(36px, 10vw, 64px);
            color: #f2c14e;
            text-shadow: 0 0 40px rgba(242, 193, 78, 0.6), 0 0 80px rgba(242, 193, 78, 0.3), 4px 4px 0 #000;
            animation: vsPulse 0.6s ease-in-out infinite alternate;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s cubic-bezier(.34, 1.56, .64, 1);
        }
        .battle-transition.active .vs-text {
            opacity: 1;
            transform: scale(1);
        }
        .battle-transition .vs-sub {
            font-family: 'VT323', monospace;
            font-size: 16px;
            color: #9fb0d0;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.6s ease 0.3s;
        }
        .battle-transition.active .vs-sub {
            opacity: 1;
        }
        @keyframes vsPulse {
            0% {
                transform: scale(1);
                text-shadow: 0 0 40px rgba(242, 193, 78, 0.6), 0 0 80px rgba(242, 193, 78, 0.3), 4px 4px 0 #000;
            }
            100% {
                transform: scale(1.08);
                text-shadow: 0 0 60px rgba(242, 193, 78, 0.8), 0 0 120px rgba(242, 193, 78, 0.4), 4px 4px 0 #000;
            }
        }
        .battle-transition .enemy-name-display {
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            color: #ff6b6b;
            margin-top: 4px;
            text-shadow: 2px 2px 0 #000;
            opacity: 0;
            transition: opacity 0.6s ease 0.4s;
        }
        .battle-transition.active .enemy-name-display {
            opacity: 1;
        }

        .vignette {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            box-shadow: inset 0 0 60px 20px rgba(0, 0, 0, 0.5);
        }

        .dmg-float {
            position: absolute;
            font-family: 'Press Start 2P', monospace;
            font-size: 16px;
            pointer-events: none;
            z-index: 6;
            animation: floatUp 0.9s ease-out forwards;
        }
        .dmg-float.hit {
            color: #f2c14e;
            text-shadow: 2px 2px 0 #000, 0 0 12px rgba(242, 193, 78, 0.4);
        }
        .dmg-float.miss {
            color: #9fb0d0;
            text-shadow: 2px 2px 0 #000;
        }
        .dmg-float.critical {
            color: #ff6b6b;
            text-shadow: 2px 2px 0 #000, 0 0 20px rgba(255, 107, 107, 0.6);
            font-size: 20px;
        }
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-60px) scale(1.2);
            }
        }

        .arena.boss-mode {
            animation: bossAmbientShake 3.6s ease-in-out infinite;
        }
        .arena.boss-mode::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 4;
            background: radial-gradient(circle at 50% 40%, transparent 40%, rgba(232, 84, 75, 0.25) 100%);
            animation: bossVignettePulse 2.8s ease-in-out infinite;
        }
        @keyframes bossAmbientShake {
            0%,
            92%,
            100% {
                transform: translate(0, 0)
            }
            93% {
                transform: translate(-4px, 3px)
            }
            95% {
                transform: translate(4px, -3px)
            }
            97% {
                transform: translate(-3px, 2px)
            }
        }
        @keyframes bossVignettePulse {
            0%,
            100% {
                opacity: 0.5
            }
            50% {
                opacity: 1
            }
        }

        /* CONSOLE */
        .console {
            display: flex;
            flex-direction: column;
            border-top: 3px solid #1f2d4a;
            background: #0b0f1a;
            flex-shrink: 0;
        }
        .dialogue {
            padding: 8px 12px;
            font-size: 15px;
            line-height: 1.4;
            color: #eaf2ff;
            min-height: 48px;
            border-bottom: 2px solid #1f2d4a;
            background: #080c18;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .dialogue .speaker {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: #f2c14e;
            margin-right: 6px;
        }
        .dialogue .text {
            font-family: 'VT323', monospace;
            font-size: 15px;
        }
        .dialogue.glitching .text {
            color: #e8544b;
            text-shadow: 2px 0 #5be7d9, -2px 0 #e8544b;
            animation: glitchText 0.08s steps(1) infinite;
        }
        @keyframes glitchText {
            0%,
            100% {
                transform: translate(0)
            }
            50% {
                transform: translate(-2px, 1px)
            }
        }
        .commands {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            padding: 8px;
        }
        .cmd-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 8.5px;
            background: #0b0f1a;
            color: #5be7d9;
            border: 2px solid #1f2d4a;
            padding: 10px 4px;
            cursor: pointer;
            line-height: 1.4;
            transition: transform 0.2s cubic-bezier(.34, 1.56, .64, 1), background 0.15s, border-color 0.15s;
            border-radius: 4px;
            touch-action: manipulation;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            word-break: break-word;
        }
        .cmd-btn:hover {
            background: #16233d;
            color: #fff;
            border-color: #5be7d9;
            transform: translateY(-2px) scale(1.03);
        }
        .cmd-btn:active {
            transform: translateY(1px) scale(0.94);
        }
        .cmd-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none !important;
        }
        .cmd-btn.wide {
            grid-column: 1 / -1;
            background: #1a2a1c;
            color: #f2c14e;
            border-color: #3a5a2a;
        }
        .cmd-btn.wide:hover {
            border-color: #f2c14e;
            background: #223a24;
        }

        /* OVERLAYS */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(6, 10, 20, 0.97);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
            z-index: 50;
            backdrop-filter: blur(6px);
            touch-action: auto;
        }
        .overlay.show {
            display: flex;
            animation: overlayBounceIn 0.45s cubic-bezier(.34, 1.56, .64, 1);
        }
        @keyframes overlayBounceIn {
            0% {
                opacity: 0;
                transform: scale(0.8)
            }
            60% {
                opacity: 1;
                transform: scale(1.03)
            }
            100% {
                transform: scale(1)
            }
        }
        .overlay-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: #5be7d9;
            margin-bottom: 8px;
            text-align: center;
            text-shadow: 0 0 12px rgba(91, 231, 217, 0.3);
        }
        svg#grid {
            background: #0c1526;
            border: 2px solid #1f2d4a;
            border-radius: 4px;
            width: 100%;
            max-width: 380px;
            height: auto;
            aspect-ratio: 1/1;
            touch-action: none;
        }
        .gridline {
            stroke: #1c2c4a;
            stroke-width: 1.8;
        }
        .axisline {
            stroke: #5be7d9;
            stroke-width: 3.5;
        }
        .tick-label {
            font-family: 'VT323', monospace;
            font-size: 16px;
            fill: #7f93bd;
            font-weight: bold;
        }
        .creature-target {
            cursor: pointer;
            touch-action: none;
        }
        .creature-target:hover rect,
        .creature-target:hover .body {
            filter: brightness(1.5);
        }
        .creature-target .body {
            transition: filter 0.15s;
        }

        .skill-select {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 6px 0 10px;
        }
        .skill-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            padding: 6px 10px;
            border: 2px solid #1f2d4a;
            background: #0b0f1a;
            color: #9fb0d0;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .skill-btn.active {
            border-color: #f2c14e;
            color: #f2c14e;
            background: rgba(242, 193, 78, 0.1);
            box-shadow: 0 0 20px rgba(242, 193, 78, 0.15);
        }
        .skill-btn:active {
            transform: scale(0.94);
        }

        .typed-panel {
            margin-top: 10px;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .typed-panel input {
            font-family: 'VT323', monospace;
            font-size: 18px;
            background: #000;
            color: #5be7d9;
            border: 2px solid #1f2d4a;
            padding: 6px 10px;
            width: 120px;
            text-align: center;
            border-radius: 4px;
            min-height: 40px;
        }
        .typed-panel button {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            background: #f2c14e;
            border: none;
            padding: 10px 14px;
            cursor: pointer;
            border-radius: 4px;
            min-height: 40px;
            touch-action: manipulation;
        }
        .typed-panel button:active {
            transform: scale(0.94);
        }
        .close-overlay {
            margin-top: 12px;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            background: transparent;
            color: #7f93bd;
            border: 2px solid #1f2d4a;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            touch-action: manipulation;
            min-height: 36px;
        }
        .close-overlay:active {
            transform: scale(0.94);
        }

        #tutorOverlay .tutor-panel {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            height: 260px;
        }
        #tutorOverlay .tutor-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        #tutorOverlay .tutor-avatar {
            width: 26px;
            height: 26px;
            background: #f2c14e;
            border: 2px solid #000;
            border-radius: 50%;
            box-shadow: 0 0 16px rgba(242, 193, 78, 0.3);
        }
        #tutorOverlay .tutor-log {
            flex: 1;
            overflow-y: auto;
            background: #0c1526;
            border: 2px solid #1f2d4a;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-radius: 4px;
            min-height: 120px;
            max-height: 180px;
        }
        #tutorOverlay .bubble {
            max-width: 88%;
            padding: 6px 9px;
            font-size: 14px;
            line-height: 1.3;
            border: 2px solid #000;
            border-radius: 4px;
        }
        #tutorOverlay .bubble.tutor {
            align-self: flex-start;
            background: #1a2a1c;
            color: #d9f2c8;
            border-color: #3a5a2a;
        }
        #tutorOverlay .bubble.player {
            align-self: flex-end;
            background: #0f2a3a;
            color: #bfe8ff;
            border-color: #1f2d4a;
        }
        #tutorOverlay .bubble.thinking {
            align-self: flex-start;
            background: #1a2a1c;
            color: #9fb08a;
            font-style: italic;
            border-color: #3a5a2a;
        }
        #tutorOverlay .bubble .tag {
            display: block;
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            margin-bottom: 3px;
            opacity: 0.7;
        }
        #tutorOverlay .tutor-input-row {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }
        #tutorOverlay .tutor-input-row input {
            flex: 1;
            font-family: 'VT323', monospace;
            font-size: 16px;
            background: #000;
            color: #eaf2ff;
            border: 2px solid #1f2d4a;
            padding: 6px 10px;
            border-radius: 4px;
            min-height: 36px;
        }
        #tutorOverlay .tutor-input-row button {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            background: #f2c14e;
            border: none;
            padding: 0 14px;
            cursor: pointer;
            border-radius: 4px;
            min-height: 36px;
            touch-action: manipulation;
        }
        #tutorOverlay .tutor-input-row button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #dodgeOverlay .dodge-box {
            position: relative;
            width: 280px;
            max-width: 85vw;
            aspect-ratio: 280/170;
            background: #050810;
            border: 3px solid #e8544b;
            box-shadow: 0 0 30px rgba(232, 84, 75, 0.4) inset, 0 0 20px rgba(232, 84, 75, 0.3);
            overflow: hidden;
            touch-action: none;
            border-radius: 4px;
        }
        #dodgeOverlay .dodge-box .dodge-player {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #5be7d9;
            border: 2px solid #fff;
            box-shadow: 0 0 12px #5be7d9;
            border-radius: 50%;
            pointer-events: none;
            touch-action: none;
        }
        #dodgeOverlay .dodge-box .dodge-player.invuln {
            animation: dodgeFlicker 0.1s steps(1) infinite;
        }
        @keyframes dodgeFlicker {
            0%,
            100% {
                opacity: 1
            }
            50% {
                opacity: 0.2
            }
        }
        #dodgeOverlay .dodge-box .dodge-bolt {
            position: absolute;
            background: #e8544b;
            box-shadow: 0 0 8px #e8544b;
            border-radius: 2px;
            pointer-events: none;
        }
        #dodgeOverlay .dodge-timer {
            font-family: 'Press Start 2P', monospace;
            font-size: 22px;
            color: #f2c14e;
            margin-top: 8px;
            text-shadow: 0 0 16px rgba(242, 193, 78, 0.5);
        }
        #dodgeOverlay .dodge-hint {
            font-size: 13px;
            color: #9fb0d0;
            margin-top: 4px;
            text-align: center;
        }

        @media (max-width:480px) {
            .intro-logo {
                font-size: 18px;
            }
            .intro-card .lv-title {
                font-size: 7px;
            }
            .intro-card .lv-desc {
                font-size: 11px;
            }
            .intro-start {
                font-size: 10px;
                padding: 10px 20px;
            }
            .cmd-btn {
                font-size: 7px;
                padding: 6px 3px;
                min-height: 36px;
            }
            .dialogue {
                font-size: 13px;
                padding: 6px 8px;
                min-height: 40px;
            }
            .enemy-sprite {
                width: 80px;
                height: 80px;
                right: 20px;
                top: 30px;
            }
            .player-sprite {
                width: 70px;
                height: 70px;
                left: 16px;
                bottom: 16px;
            }
            .nameplate.enemy-plate {
                top: 6px;
                left: 6px;
                min-width: 90px;
                padding: 4px 6px;
            }
            .nameplate.player-plate {
                bottom: 6px;
                right: 6px;
                min-width: 90px;
                padding: 4px 6px;
            }
            .score-tag {
                font-size: 7px;
                padding: 2px 6px;
            }
            .lv-chip {
                font-size: 6px;
                padding: 2px 4px;
            }
            .topbar {
                padding: 4px 6px;
                min-height: 32px;
            }
            .commands {
                padding: 4px;
