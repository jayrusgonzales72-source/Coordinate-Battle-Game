                    return 'III'; return 'IV'; }

            function shadeLighten(hex, amt = 40) { const n = parseInt(hex.slice(1), 16); const r = Math.min(255, ((n >>
                        16) & 255) + amt); const g = Math.min(255, ((n >> 8) & 255) + amt); const b = Math.min(255, (n &
                        255) + amt); return `rgb(${r},${g},${b})`; }

